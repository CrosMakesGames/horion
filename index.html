    function resetSportsPlayer() {
        sportsState.selectedSourceValue = '';
        const sourceSelect = document.getElementById('sports-source-select');
        const streamSelect = document.getElementById('sports-stream-select');
        const frame = document.getElementById('sports-stream-frame');

        if (sourceSelect) {
            sourceSelect.innerHTML = '<option value="">SELECT SOURCE</option>';
            sourceSelect.disabled = true;
        }

        if (streamSelect) {
            streamSelect.innerHTML = '<option value="">SELECT STREAM</option>';
            streamSelect.disabled = true;
        }

        if (frame) {
            frame.src = 'about:blank';
        }

        setSportsPlayerStatus('Choose a match to load stream sources.');
    }

    async function refreshSportsMatches() {
        setSportsStatus('Loading matches...', false);
        resetSportsPlayer();

        try {
            const endpoint = getSportsMatchesEndpoint();
            const matches = await fetchSportsJson(endpoint);
            sportsState.matches = Array.isArray(matches) ? matches : [];
            sportsState.selectedMatchId = null;
            renderSportsMatches();
            setSportsStatus(`Loaded ${sportsState.matches.length} matches.`, false);
        } catch (error) {
            if (sportsState.sport !== 'all') {
                try {
                    const fallbackEndpoint = getSportsMatchesEndpoint(sportsState.feed);
                    const fallbackMatches = await fetchSportsJson(fallbackEndpoint);
                    sportsState.matches = Array.isArray(fallbackMatches) ? fallbackMatches : [];
                    sportsState.selectedMatchId = null;
                    renderSportsMatches();
                    setSportsStatus(`${getSportLabelById(sportsState.sport)} currently unavailable. Showing ${String(sportsState.feed).toUpperCase()} feed with ${sportsState.matches.length} matches.`, false);
                    return;
                } catch (fallbackError) {
                    console.error('Sports fallback load failed:', fallbackError);
                }
            }

            sportsState.matches = [];
            renderSportsMatches();
            setSportsStatus('Failed to load sports matches. Try again.', true);
            console.error('Sports match load failed:', error);
        }
    }

    async function selectSportsMatch(matchId) {
        sportsState.selectedMatchId = String(matchId || '');
        renderSportsMatches();

        const selectedMatch = sportsState.matches.find((m) => String(m.id) === sportsState.selectedMatchId);
        if (!selectedMatch || !Array.isArray(selectedMatch.sources) || !selectedMatch.sources.length) {
            resetSportsPlayer();
            setSportsPlayerStatus('No stream sources available for this match.');
            return;
        }

        const sourceSelect = document.getElementById('sports-source-select');
        if (!sourceSelect) return;

        sourceSelect.innerHTML = '';
        selectedMatch.sources.forEach((entry) => {
            const option = document.createElement('option');
            const value = `${entry.source}::${entry.id}`;
            option.value = value;
            option.textContent = `${String(entry.source || '').toUpperCase()} | ${entry.id}`;
            sourceSelect.appendChild(option);
        });

        sourceSelect.disabled = false;
        const firstSource = selectedMatch.sources[0];
        const sourceValue = `${firstSource.source}::${firstSource.id}`;
        sourceSelect.value = sourceValue;
        await onSportsSourceChanged(sourceValue);
    }

    async function onSportsSourceChanged(value) {
        const streamSelect = document.getElementById('sports-stream-select');
        if (!streamSelect) return;

        const safeValue = String(value || '');
        if (!safeValue.includes('::')) {
            streamSelect.innerHTML = '<option value="">SELECT STREAM</option>';
            streamSelect.disabled = true;
            return;
        }

        sportsState.selectedSourceValue = safeValue;
        const parts = safeValue.split('::');
        const sourceName = parts[0];
        const sourceId = parts.slice(1).join('::');
        const cacheKey = `${sourceName}::${sourceId}`;
        let streams = sportsState.sourceStreamsCache[cacheKey];

        setSportsPlayerStatus('Loading stream list...');
        if (!Array.isArray(streams)) {
            try {
                streams = await fetchSportsJson(`${STREAMED_API_BASE}/stream/${encodeURIComponent(sourceName)}/${encodeURIComponent(sourceId)}`);
                sportsState.sourceStreamsCache[cacheKey] = Array.isArray(streams) ? streams : [];
            } catch (error) {
                sportsState.sourceStreamsCache[cacheKey] = [];
                streams = [];
                console.error('Sports stream load failed:', error);
            }
        }

        streamSelect.innerHTML = '';
        if (!streams.length) {
            const option = document.createElement('option');
            option.value = '';
            option.textContent = 'NO STREAMS FOUND';
            streamSelect.appendChild(option);
            streamSelect.disabled = true;
            setSportsPlayerStatus('No streams found for this source. Try another source.');
            return;
        }

        streams.forEach((stream, idx) => {
            const option = document.createElement('option');
            option.value = String(idx);
            const lang = stream.language || 'Unknown';
            const quality = stream.hd ? 'HD' : 'SD';
            const number = Number.isFinite(Number(stream.streamNo)) ? stream.streamNo : (idx + 1);
            option.textContent = `#${number} | ${lang} | ${quality}`;
            streamSelect.appendChild(option);
        });

        streamSelect.disabled = false;
        streamSelect.value = '0';
        onSportsStreamChanged('0');
    }

    function onSportsStreamChanged(indexValue) {
        const safeSource = String(sportsState.selectedSourceValue || '');
        if (!safeSource.includes('::')) return;

        const parts = safeSource.split('::');
        const sourceName = parts[0];
        const sourceId = parts.slice(1).join('::');
        const cacheKey = `${sourceName}::${sourceId}`;
        const streams = sportsState.sourceStreamsCache[cacheKey] || [];
        const selectedIndex = Number(indexValue);
        const selectedStream = streams[selectedIndex];

        if (!selectedStream || !selectedStream.embedUrl) {
            setSportsPlayerStatus('Selected stream is unavailable.');
            return;
        }

        const frame = document.getElementById('sports-stream-frame');
        if (frame) {
            frame.src = selectedStream.embedUrl;
        }

        setSportsPlayerStatus(`Now playing: ${selectedStream.language || 'Unknown'} ${selectedStream.hd ? 'HD' : 'SD'} (${sourceName.toUpperCase()})`);
    }

    function onSportsFeedChanged(value) {
        sportsState.feed = String(value || 'live');
        refreshSportsMatches();
    }

    function onSportsCategoryChanged(value) {
        sportsState.sport = String(value || 'all');
        renderSportsQuickChips();

    async function initSportsView() {
        if (!sportsState.initialized) {
            const feedSelect = document.getElementById('sports-feed-select');
            const categorySelect = document.getElementById('sports-category-select');
            if (feedSelect) feedSelect.value = sportsState.feed;
            if (categorySelect) categorySelect.value = sportsState.sport;
            sportsState.initialized = true;
        }

        if (!sportsState.catalogLoaded) {
            try {
                const sports = await fetchSportsJson(`${STREAMED_API_BASE}/sports`);
                sportsState.sports = getMergedSportsCatalog(sports);
                sportsState.catalogLoaded = true;
            } catch (error) {
                sportsState.sports = getMergedSportsCatalog([]);
                sportsState.catalogLoaded = true;
                setSportsStatus('Sports catalog unavailable. Loaded local expanded catalog instead.', true);
                console.error('Sports catalog load failed:', error);
            }
            renderSportsCatalog();
        }

        if (!sportsState.matches.length) {
            await refreshSportsMatches();
        } else {
            renderSportsMatches();
            setSportsStatus(`Loaded ${sportsState.matches.length} matches.`, false);
        }
    }

    async function loadMedia({ id, type, season, epNumber }) {
        document.getElementById('view-details').innerHTML = '<div style="text-align:center; padding:50px; color:var(--neon-blue);">ACCESSING DATA...</div>';
        
        try {
            state.currentShow = await ShowService.getDetails(id, type);
            
            if (type === 'tv') {
                const targetSeason = season || 1;
                state.currentSeason = targetSeason;
                
                const eps = await ShowService.getSeasonEpisodes(id, targetSeason);
                state.currentShow.episodes[targetSeason] = eps;

                if (epNumber) {
                    state.currentEpisode = eps.find(e => e.number === epNumber) || eps[0];
                } else {
                    state.currentEpisode = eps[0] || { number: 1, title: 'Unavailable' };
                }
            } else {
                saveProgress();
            }
            
            renderDetailsView();

            if (state.currentShow && state.currentShow.title) {
                document.title = `${state.currentShow.title} - Horion TV`;
            } else {
                document.title = 'Horion TV';
            }

            try {
                if (window.parent && window.parent !== window && typeof window.parent.onTvViewChange === 'function') {
                    window.parent.onTvViewChange('details', {
                        id: state.currentShow.id,
                        type: state.currentShow.type,
                        season: state.currentShow.type === 'tv' ? state.currentSeason : null,
                        epNumber: state.currentShow.type === 'tv' && state.currentEpisode ? state.currentEpisode.number : null,
                        title: state.currentShow.title || ''
                    });
                }
            } catch (err) {
                // Ignore parent messaging errors.
            }
        } catch(e) {
             document.getElementById('view-details').innerHTML = '<div style="text-align:center; padding:50px; color:red;">DATA CORRUPTED. RETRY.</div>';
        }
    }

            const isActive = (ep.number === state.currentEpisode?.number);
            return `
                <div class="episode-item ${isActive ? 'active' : ''}" onclick="playEpisode(${state.currentSeason}, ${idx})">

    async function changeSeason(season) {
        state.currentSeason = parseInt(season);
        
        if (!state.currentShow.episodes[state.currentSeason]) {
            const container = document.getElementById('episodes-scroll');
            container.innerHTML = '<div style="padding:20px; color:var(--neon-blue); text-align:center; font-family:\'JetBrains Mono\';">LOADING...</div>';
            
            const eps = await ShowService.getSeasonEpisodes(state.currentShow.id, state.currentSeason);
            state.currentShow.episodes[state.currentSeason] = eps;
        }
        renderEpisodeList();

        try {
            if (window.parent && window.parent !== window && typeof window.parent.onTvViewChange === 'function' && state.currentShow) {
                window.parent.onTvViewChange('details', {
                    id: state.currentShow.id,
                    type: state.currentShow.type,
                    season: state.currentSeason,
                    epNumber: state.currentEpisode ? state.currentEpisode.number : null,
                    title: state.currentShow.title || ''
                });
            }
        } catch (err) {
            // Ignore parent messaging errors.
        }
    }

    function playEpisode(season, index) {
        state.currentSeason = season;
        state.currentEpisode = state.currentShow.episodes[season][index];
        saveProgress(); 
        renderDetailsView(); 
        window.scrollTo(0,0);

        try {
            if (window.parent && window.parent !== window && typeof window.parent.onTvViewChange === 'function' && state.currentShow) {
                window.parent.onTvViewChange('details', {
                    id: state.currentShow.id,
                    type: state.currentShow.type,
                    season: state.currentSeason,
                    epNumber: state.currentEpisode ? state.currentEpisode.number : null,
                    title: state.currentShow.title || ''
                });
            }
        } catch (err) {
            // Ignore parent messaging errors.
        }
    }

    function switchServer(server) {
        state.currentServer = server;
        renderDetailsView();
    }

    function getProviderUrl(imdbId, tmdbId, type, season = null, episode = null) {
        const idToUse = tmdbId || imdbId;
        
        if (state.currentServer === 'server1') {
            if (type === 'movie') {
                return `https://vidsrc.cc/v2/embed/movie/${idToUse}`;
            } else {
                return `https://vidsrc.cc/v2/embed/tv/${idToUse}/${season}/${episode}`;
            }
        } else {
            if (type === 'movie') {
                return `https://multiembed.mov/directstream.php?video_id=${imdbId}&tmdb=${tmdbId}`;
            } else {
                return `https://multiembed.mov/directstream.php?video_id=${imdbId}&tmdb=${tmdbId}&s=${season}&e=${episode}`;
            }
        }
    }

    // ========================================== 
    // 7. YOUTUBE NAV LAUNCHER LOGIC

const UBEAST_MATCH_TEXT = 'ubeast';
const UBEAST_RELOAD_PARAM = '__horion_ubeast_reload';

function urlContainsUbeast(urlValue) {
    return String(urlValue || '').toLowerCase().includes(UBEAST_MATCH_TEXT);
}

function appendUbeastReloadParam(urlValue) {
    const raw = String(urlValue || '').trim();
    if (!raw) return raw;
    try {
        const parsed = new URL(raw, window.location.href);
        parsed.searchParams.set(UBEAST_RELOAD_PARAM, String(Date.now()));
        return parsed.href;
    } catch (error) {
        const separator = raw.includes('?') ? '&' : '?';
        return raw + separator + UBEAST_RELOAD_PARAM + '=' + Date.now();
    }
}

function getUbeastReloadKey(urlValue) {
    const raw = String(urlValue || '').trim();
    if (!raw) return '';
    try {
        const parsed = new URL(raw, window.location.href);
        parsed.searchParams.delete(UBEAST_RELOAD_PARAM);
        return parsed.href;
    } catch (error) {
        return raw
            .replace(new RegExp('([?&])' + UBEAST_RELOAD_PARAM + '=[^&]*', 'ig'), '$1')
            .replace(/[?&]$/, '');
    }
}

function launchSite(targetUrl, options) {
    const normalizedUrl = String(targetUrl || '').trim();
    if (!normalizedUrl) return false;
    const safeUrl = normalizedUrl;
    const safeUrlAttr = safeUrl
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;');

    const win = window.open('about:blank', '_blank');
    if (!win) {

    try {

    } catch (err) {

    }

    const wrapperHtml = `<!DOCTYPE html>
<html>

<body>
    <iframe id="horion-tv-popup-frame" src="${safeUrlAttr}" allow="autoplay; fullscreen; xr-spatial-tracking; encrypted-media; clipboard-read; clipboard-write; display-capture; gamepad; picture-in-picture; screen-wake-lock" allowfullscreen referrerpolicy="no-referrer"></iframe>
    <script>
    (function () {
        const frame = document.getElementById('horion-tv-popup-frame');
        if (!frame) return;

        const matchText = ${JSON.stringify(UBEAST_MATCH_TEXT)};
        const reloadParam = ${JSON.stringify(UBEAST_RELOAD_PARAM)};
        const cooldownMs = 3500;
        const seenAt = new Map();

        const appendReloadParam = function (urlValue) {
            const raw = String(urlValue || '').trim();
            if (!raw) return raw;
            try {
                const parsed = new URL(raw, window.location.href);
                parsed.searchParams.set(reloadParam, String(Date.now()));
                return parsed.href;
            } catch (error) {
                const separator = raw.includes('?') ? '&' : '?';
                return raw + separator + reloadParam + '=' + Date.now();
            }
        };

        const getReloadKey = function (urlValue) {
            const raw = String(urlValue || '').trim();
            if (!raw) return '';
            try {
                const parsed = new URL(raw, window.location.href);
                parsed.searchParams.delete(reloadParam);
                return parsed.href;
            } catch (error) {
                return raw
                    .replace(new RegExp('([?&])' + reloadParam + '=[^&]*', 'ig'), '$1')
                    .replace(/[?&]$/, '');
            }
        };

        const shouldReloadNow = function (candidateUrl) {
            if (!candidateUrl || String(candidateUrl).toLowerCase().indexOf(matchText) === -1) return false;
            const key = getReloadKey(candidateUrl);
            const now = Date.now();
            const last = seenAt.get(key) || 0;
            if (now - last < cooldownMs) return false;
            seenAt.set(key, now);
            return true;
        };

        const reloadSameMethod = function (candidateUrl) {
            const target = appendReloadParam(candidateUrl || frame.getAttribute('src') || frame.src);
            if (!target) return;
            try {
                frame.src = target;
            } catch (error) {
                window.location.reload();
            }
        };

        const inspectUrl = function (candidateUrl) {
            if (!shouldReloadNow(candidateUrl)) return;
            reloadSameMethod(candidateUrl);
        };

        frame.addEventListener('load', function () {
            inspectUrl(frame.getAttribute('src') || frame.src);
            try {
                inspectUrl(frame.contentWindow && frame.contentWindow.location ? frame.contentWindow.location.href : '');
            } catch (error) {
                // Cross-origin frame location is expected to be blocked.
            }
        });

        const observer = new MutationObserver(function () {
            inspectUrl(frame.getAttribute('src') || frame.src);
        });
        observer.observe(frame, { attributes: true, attributeFilter: ['src'] });

        setInterval(function () {
            inspectUrl(frame.getAttribute('src') || frame.src);
            try {
                inspectUrl(frame.contentWindow && frame.contentWindow.location ? frame.contentWindow.location.href : '');
            } catch (error) {
                // Cross-origin frame location is expected to be blocked.
            }
        }, 1000);

        inspectUrl(frame.getAttribute('src') || frame.src);
    })();

</body>
</html>`;

    win.document.open();

}

function buildTvProxiedInlineHtml(html, baseUrl) {
    const safeBase = String(baseUrl).replace(/"/g, '&quot;');
    const baseTag = `<base href="${safeBase}" target="_self">`;

    const sanitizedHtml = String(html)
        .replace(/<meta[^>]*http-equiv=["']content-security-policy["'][^>]*>/gi, '')
        .replace(/<meta[^>]*http-equiv=["']x-content-security-policy["'][^>]*>/gi, '')
        .replace(/<base[^>]*>/gi, '');

    const guardScript = `
<script>
(function () {
    const toAbsoluteUrl = function (value) {
        try {
            return new URL(value, document.baseURI).href;
        } catch (error) {
            return null;
        }
    };

    const isSkippableHref = function (href) {
        if (!href) return true;
        const lower = String(href).trim().toLowerCase();
        return lower.startsWith('#') || lower.startsWith('javascript:') || lower.startsWith('mailto:') || lower.startsWith('tel:');
    };

    const navigateInline = function (url) {
        if (!url || typeof window.__horionNavigate !== 'function') return;
        window.__horionNavigate(url);
    };

    const forceSameTabTargets = function () {
        document.querySelectorAll('a[target], form[target]').forEach(function (node) {
            node.setAttribute('target', '_self');
        });
    };

    const originalOpen = window.open;
    window.open = function (url) {
        const resolved = toAbsoluteUrl(url || '');
        if (resolved) {
            navigateInline(resolved);
            return window;
        }
        return originalOpen ? originalOpen.apply(window, arguments) : window;
    };

    forceSameTabTargets();
    const observer = new MutationObserver(forceSameTabTargets);
    observer.observe(document.documentElement, { childList: true, subtree: true });

    document.addEventListener('click', function (event) {
        const target = event.target && event.target.closest ? event.target.closest('a[href], [data-href], button[data-href]') : null;
        if (!target) return;

        const href = target.getAttribute('href') || target.getAttribute('data-href');
        if (isSkippableHref(href)) return;

        const resolved = toAbsoluteUrl(href);
        if (!resolved) return;

        event.preventDefault();
        navigateInline(resolved);
    }, true);

    document.addEventListener('submit', function (event) {
        const form = event.target;
        if (!form || !form.getAttribute) return;

        const method = (form.getAttribute('method') || 'get').toLowerCase();
        const action = form.getAttribute('action') || window.location.href;
        const resolvedAction = toAbsoluteUrl(action);
        if (!resolvedAction || method !== 'get') return;

        event.preventDefault();
        const formData = new FormData(form);
        const params = new URLSearchParams(formData);
        const nextUrl = new URL(resolvedAction);
        params.forEach(function (value, key) {
            nextUrl.searchParams.set(key, value);
        });
        navigateInline(nextUrl.href);
    }, true);
})();
<\/script>`;

    if (/<head[^>]*>/i.test(sanitizedHtml)) {
        return sanitizedHtml.replace(/<head[^>]*>/i, function (match) {
            return match + baseTag + guardScript;
        });
    }

    return baseTag + guardScript + sanitizedHtml;
}

function openInlineTvPage(targetUrl, titleText, options) {
    const normalizedUrl = String(targetUrl || '').trim();
    if (!normalizedUrl) return false;

    const opts = options || {};
    const blockNewTabs = Boolean(opts.blockNewTabs);
    const useProxyGuard = Boolean(opts.useProxyGuard);
    const fullscreen = Boolean(opts.fullscreen);

    const existing = document.getElementById('horion-tv-inline-page');
    if (existing) existing.remove();

    const host = document.createElement('section');
    host.id = 'horion-tv-inline-page';
    host.style.position = 'fixed';
    host.style.left = '0';
    host.style.right = '0';
    host.style.bottom = '0';
    host.style.zIndex = '9990';
    host.style.background = '#000';
    host.style.borderTop = '1px solid rgba(0, 112, 255, 0.25)';

    host.innerHTML = `
        <iframe
            id="horion-tv-inline-host-frame"
            src="about:blank"
            allow="autoplay; encrypted-media; fullscreen"
            allowfullscreen
            style="border:none;width:100%;height:100%;background:#000;"
        ></iframe>
    `;

    const applyOffset = function () {
        if (fullscreen) {
            host.style.top = '0px';
            return;
        }
        const nav = document.querySelector('.hud-nav');
        const top = nav ? Math.max(0, Math.round(nav.getBoundingClientRect().bottom)) : 0;
        host.style.top = top + 'px';
    };

    const closeInlineView = function () {
        window.removeEventListener('resize', applyOffset);
        document.removeEventListener('keydown', onKeydown);
        host.remove();
    };

    const onKeydown = function (event) {
        if (event.key === 'Escape') closeInlineView();
    };

    document.body.appendChild(host);
    const hostFrame = document.getElementById('horion-tv-inline-host-frame');
    const inlineNavToken = 'horion-tv-inline-nav-' + Date.now() + '-' + Math.random().toString(16).slice(2);
    let isClosing = false;
    const inlineUbeastReloadSeenAt = new Map();

    const shouldReloadInlineForUbeast = function (candidateUrl, scope) {
        if (!urlContainsUbeast(candidateUrl)) return false;
        const key = scope + '|' + getUbeastReloadKey(candidateUrl);
        const now = Date.now();
        const last = inlineUbeastReloadSeenAt.get(key) || 0;
        if (now - last < 3500) return false;
        inlineUbeastReloadSeenAt.set(key, now);
        return true;
    };

    const renderDirectWrapper = function (urlOverride) {
        if (!hostFrame || !hostFrame.contentWindow || !hostFrame.contentWindow.document) return;
        const titleAttr = String(titleText || 'TV Tool');
        const launchUrl = String(urlOverride || normalizedUrl || '').trim();
        const wrapperHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>' + titleAttr + '</title><base target="_self"><style>html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}iframe{border:none;width:100%;height:100%;background:#000}</style></head><body><iframe id="horion-tv-inline-inner-frame" src="' + launchUrl + '" allow="autoplay; encrypted-media; fullscreen; clipboard-read; clipboard-write; picture-in-picture; screen-wake-lock"></iframe><script>(function(){const frame=document.getElementById("horion-tv-inline-inner-frame");if(!frame)return;const inspect=function(url){if(!url||typeof window.__horionReloadSelf!=="function")return;if(String(url).toLowerCase().indexOf("' + UBEAST_MATCH_TEXT + '")!==-1){window.__horionReloadSelf(url);}};frame.addEventListener("load",function(){inspect(frame.getAttribute("src")||frame.src);try{inspect(frame.contentWindow&&frame.contentWindow.location?frame.contentWindow.location.href:"");}catch(err){}});const observer=new MutationObserver(function(){inspect(frame.getAttribute("src")||frame.src);});observer.observe(frame,{attributes:true,attributeFilter:["src"]});setInterval(function(){inspect(frame.getAttribute("src")||frame.src);try{inspect(frame.contentWindow&&frame.contentWindow.location?frame.contentWindow.location.href:"");}catch(err){}},1000);inspect(frame.getAttribute("src")||frame.src);})();<\/script></body></html>';
        hostFrame.contentWindow.__horionReloadSelf = function (nextUrl) {
            if (isClosing) return;
            const detectedUrl = String(nextUrl || launchUrl || normalizedUrl || '').trim();
            if (!shouldReloadInlineForUbeast(detectedUrl, 'direct')) return;
            renderDirectWrapper(appendUbeastReloadParam(detectedUrl));
        };
        hostFrame.contentWindow.document.open();
        hostFrame.contentWindow.document.write(wrapperHtml);
        hostFrame.contentWindow.document.close();
    };

    const renderProxiedPage = function (urlValue) {
        const safeUrl = String(urlValue || '').trim();
        if (!safeUrl || isClosing || !hostFrame || !hostFrame.contentWindow || !hostFrame.contentWindow.document) return;

        if (shouldReloadInlineForUbeast(safeUrl, 'proxy')) {
            renderProxiedPage(appendUbeastReloadParam(safeUrl));
            return;
        }

        fetch(safeUrl)
            .then((response) => {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.text();
            })
            .then((htmlText) => {
                if (isClosing || !hostFrame.contentWindow || !hostFrame.contentWindow.document) return;
                const proxiedHtml = buildTvProxiedInlineHtml(htmlText, safeUrl);
                hostFrame.contentWindow.__horionNavigate = function (nextUrl) {
                    window.postMessage({ type: 'HORION_TV_INLINE_NAV', token: inlineNavToken, url: nextUrl }, '*');
                };
                hostFrame.contentWindow.__horionReloadSelf = function (nextUrl) {
                    const detectedUrl = String(nextUrl || safeUrl || '').trim();
                    if (!shouldReloadInlineForUbeast(detectedUrl, 'proxy')) return;
                    renderProxiedPage(appendUbeastReloadParam(detectedUrl));
                };
                hostFrame.contentWindow.document.open();
                hostFrame.contentWindow.document.write(proxiedHtml);
                hostFrame.contentWindow.document.close();
            })
            .catch((error) => {
                console.warn('Inline proxy fetch failed, falling back to direct iframe wrapper.', error);
                renderDirectWrapper();
            });
    };

    const onInlineMessage = function (event) {
        const data = event && event.data ? event.data : null;
        if (!data || data.type !== 'HORION_TV_INLINE_NAV' || data.token !== inlineNavToken) return;
        if (shouldReloadInlineForUbeast(data.url, 'proxy')) {
            renderProxiedPage(appendUbeastReloadParam(data.url));
            return;
        }
        renderProxiedPage(data.url);
    };

    if (useProxyGuard && blockNewTabs) {
        window.addEventListener('message', onInlineMessage);
        renderProxiedPage(normalizedUrl);
    } else {
        renderDirectWrapper();
    }

    const originalCloseInlineView = closeInlineView;
    closeInlineView = function () {
        isClosing = true;
        window.removeEventListener('message', onInlineMessage);
        originalCloseInlineView();
    };

    applyOffset();
    window.addEventListener('resize', applyOffset);
    document.addEventListener('keydown', onKeydown);

    return true;
}

        function parseRouteFromUrl() {

            if (!mode && pageParam) {
                const isGamesPage = validGamesViews.has(pageParam) || specialGamesViews.has(pageParam);
                const isTvPage = validTvViews.has(pageParam);

                if (isTvPage && !isGamesPage) {

                gamesView,
                gamesPage,
                tvView,
                tvDetails

                    mode: model.mode,
                    gamesView: safeGamesView,
                    gamesPage: safeGamesView === 'featured' ? (model.currentGamesPage || null) : null,
                    tvView: safeTvView,
                    tvDetails: safeTvView === 'details' ? (model.currentTvDetails || null) : null
                };
                localStorage.setItem(ROUTE_STORAGE_KEY, JSON.stringify(payload));
            } catch (err) {
                // Ignore storage quota/private-mode issues.
            }
        }

        function loadRouteSnapshot() {
            try {
                const raw = localStorage.getItem(ROUTE_STORAGE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                if (!parsed || typeof parsed !== 'object') return null;

                const mode = validModes.has(parsed.mode) ? parsed.mode : null;
                if (!mode) return null;

                const gamesView = getRefreshSafeGamesView(parsed.gamesView);
                const gamesPage = gamesView === 'featured' && typeof parsed.gamesPage === 'string'
                    ? parsed.gamesPage.trim() || null
                    : null;
                const tvView = getRefreshSafeTvView(parsed.tvView);
                let tvDetails = tvView === 'details' ? normalizeTvDetails(parsed.tvDetails) : null;
                if (tvView === 'details' && !tvDetails) {
                    tvDetails = null;
                }

                return { mode, gamesView, gamesPage, tvView, tvDetails };
            } catch (err) {
                return null;
            }
        }

        function syncUrlWithState(push) {
            const url = new URL(window.location.href);
            const routeGamesView = getRefreshSafeGamesView(model.currentGamesView);
            const routeGamesPage = routeGamesView === 'featured' ? (String(model.currentGamesPage || '').trim() || null) : null;
            const routeTvView = getRefreshSafeTvView(model.currentTvView);

            url.searchParams.set('type', model.mode);
            if (model.mode === 'games') {
                url.searchParams.set('page', routeGamesPage || routeGamesView);
            } else {
                url.searchParams.set('page', routeTvView);
            }

            // Remove old dual-view params so URL only reflects the active side.
            url.searchParams.delete('mode');
            url.searchParams.delete('games');
            url.searchParams.delete('tv');

            if (model.mode === 'tv' && routeTvView === 'details' && model.currentTvDetails) {
                url.searchParams.set('tvId', String(model.currentTvDetails.id));
                url.searchParams.set('tvType', model.currentTvDetails.type);
                if (model.currentTvDetails.season) {
                    url.searchParams.set('tvSeason', String(model.currentTvDetails.season));
                } else {
                    url.searchParams.delete('tvSeason');
                }
                if (model.currentTvDetails.epNumber) {
                    url.searchParams.set('tvEpisode', String(model.currentTvDetails.epNumber));
                } else {
                    url.searchParams.delete('tvEpisode');
                }
            } else {
                url.searchParams.delete('tvId');
                url.searchParams.delete('tvType');
                url.searchParams.delete('tvSeason');
                url.searchParams.delete('tvEpisode');
            }

            const currentUrl = window.location.href;
            const nextUrl = url.toString();
            if (currentUrl === nextUrl) return;

            const statePayload = {
                mode: model.mode,
                gamesView: model.currentGamesView,
                gamesPage: model.currentGamesView === 'featured' ? model.currentGamesPage : null,
                tvView: model.currentTvView,
                tvDetails: model.currentTvDetails
            };

            // Avoid pushState frequency errors during rapid view switching.
            const now = Date.now();
            const usePush = Boolean(push) && now - lastHistoryPushAt > 180;

            try {
                if (usePush) {
                    history.pushState(statePayload, '', url);
                    lastHistoryPushAt = now;
                } else {
                    history.replaceState(statePayload, '', url);
                }
                saveRouteSnapshot();
            } catch (err) {
                try {
                    history.replaceState(statePayload, '', url);
                    saveRouteSnapshot();
                } catch (replaceErr) {
                    console.warn('Failed to sync URL state.', replaceErr || err);
                }
            }
        }

        function applyRouteState(route) {
            isApplyingRoute = true;
            model.mode = route.mode;
            model.currentGamesView = route.gamesView;
            model.currentGamesPage = route.gamesPage || null;
            model.currentTvView = route.tvView;
            model.currentTvDetails = route.tvDetails || null;

            document.body.setAttribute('data-mode', model.mode);
            syncTrackTransform(false);
            updateModeDock();
            updateActivePane();
            setTrackSettled(true);

            if (model.mode === 'games') {
                navigateGames(model.currentGamesView, model.currentGamesPage);
            } else {
                navigateTv(model.currentTvView, model.currentTvDetails);
            }

            updateShellTitle();

            isApplyingRoute = false;
            syncUrlWithState(false);
        }

        function withFrame(frameId, callback) {
            const frame = document.getElementById(frameId);
            if (!frame || !frame.contentWindow) return false;
            try {
                callback(frame.contentWindow, frame.contentDocument);
                return true;
            } catch (err) {
                console.warn('Frame bridge failed for', frameId, err);
                return false;
            }
        }

        function resolveGamesView(view) {
            return (validGamesViews.has(view) || specialGamesViews.has(view)) ? view : 'home';
        }

        function normalizeGamesStateView(view) {
            return launchOnlyGamesViews.has(view) ? 'home' : resolveGamesView(view);
        }

        function normalizeTvStateView(view) {
            if (launchOnlyTvViews.has(view)) return 'home';
            return validTvViews.has(view) ? view : 'home';
        }

        function resolveTvNavigation(view, param) {
            let resolvedView = validTvViews.has(view) ? view : 'home';
            let resolvedDetails = null;

            if (resolvedView === 'details') {
                resolvedDetails = normalizeTvDetails(param) || normalizeTvDetails(model.currentTvDetails);
                if (!resolvedDetails) {
                    resolvedView = 'home';
                }
            }

            return {
                view: resolvedView,
                details: resolvedDetails
            };
        }

        function updateModeDock() {
            const chips = document.querySelectorAll('.mode-chip');
            chips.forEach(chip => {
                const active = chip.dataset.modeTarget === model.mode;
                chip.classList.toggle('active', active);
                chip.setAttribute('aria-pressed', active ? 'true' : 'false');
            });
        }

        function updateActivePane() {
            document.querySelectorAll('.mode-pane[data-mode-pane]').forEach(pane => {
                const isActive = pane.dataset.modePane === model.mode;
                pane.classList.toggle('active', isActive);
            });
        }

        function getTrackTransformForMode(mode) {
            return mode === 'tv' ? 'translateX(-50%)' : 'translateX(0)';
        }

        function getExpectedTrackTransform() {
            return getTrackTransformForMode(model.mode);
        }

        function syncTrackTransform(animate = false, modeOverride = null) {
            const track = document.getElementById('switch-track');
            if (!track) return;

            if (animate) {
                track.classList.add('animate');
            } else if (!switchTrackTimer && track.classList.contains('animate')) {
                track.classList.remove('animate');
            }

            const modeToUse = modeOverride || model.mode;
            track.style.transform = getTrackTransformForMode(modeToUse);
        }

        function setTrackSettled(settled) {
            const track = document.getElementById('switch-track');
            if (!track) return;
            track.classList.toggle('settled', Boolean(settled));
        }

        function armTrackSettle(expectedMode) {
            const track = document.getElementById('switch-track');
            if (!track) {
                setTrackSettled(true);
                return;
            }

            if (switchTrackTransitionHandler) {
                track.removeEventListener('transitionend', switchTrackTransitionHandler);
                switchTrackTransitionHandler = null;
            }

            if (switchTrackTimer) {
                clearTimeout(switchTrackTimer);
            }

            switchTrackTransitionHandler = (event) => {
                if (event.propertyName !== 'transform') return;
                track.removeEventListener('transitionend', switchTrackTransitionHandler);
                switchTrackTransitionHandler = null;

                if (model.mode === expectedMode) {
                    syncTrackTransform(false, expectedMode);
                    setTrackSettled(true);
                }

                if (switchTrackTimer) {
                    clearTimeout(switchTrackTimer);
                    switchTrackTimer = null;
                }
            };

            track.addEventListener('transitionend', switchTrackTransitionHandler);

            // Fallback in case transitionend is skipped during rapid switching.
            switchTrackTimer = setTimeout(() => {
                if (switchTrackTransitionHandler) {
                    track.removeEventListener('transitionend', switchTrackTransitionHandler);
                    switchTrackTransitionHandler = null;
                }

                if (model.mode === expectedMode) {
                    syncTrackTransform(false, expectedMode);
                    setTrackSettled(true);
                }

                switchTrackTimer = null;
            }, 320);
        }

        function enforceShellLayoutIntegrity() {
            const root = document.documentElement;
            if (root.getAttribute('dir') !== 'ltr') {
                root.setAttribute('dir', 'ltr');
            }

            if (document.body) {
                if (document.body.style.direction !== 'ltr') {
                    document.body.style.direction = 'ltr';
                }
                if (document.body.getAttribute('data-mode') !== model.mode) {
                    document.body.setAttribute('data-mode', model.mode);
                }
            }

            const track = document.getElementById('switch-track');
            if (track) {
                const expected = getExpectedTrackTransform();
                if (track.style.transform !== expected) {
                    syncTrackTransform(false);
                } else if (!switchTrackTimer && track.classList.contains('animate')) {
                    track.classList.remove('animate');
                }
                if (!switchTrackTimer && !track.classList.contains('settled')) {
                    setTrackSettled(true);
                }
            }

            updateModeDock();
            updateActivePane();
        }

        function loadEmbeddedApps() {
            frameState.gamesLoaded = false;
            frameState.tvLoaded = false;
            frameState.pendingGamesView = null;
            frameState.pendingTvNavigation = null;
            document.getElementById('games-frame').srcdoc = GAMES_APP_HTML;
            document.getElementById('tv-frame').srcdoc = TV_APP_HTML;
        }

        function navigateGames(view, pageId = null) {
            const safeView = resolveGamesView(view);
            const normalizedStateView = normalizeGamesStateView(safeView);
            const normalizedPageId = safeView === 'featured' && typeof pageId === 'string'
                ? pageId.trim() || null
                : null;
            model.currentGamesView = normalizedStateView;
            model.currentGamesPage = safeView === 'featured' ? normalizedPageId : null;

            if (!frameState.gamesLoaded) {
                frameState.pendingGamesView = {
                    view: safeView,
                    pageId: model.currentGamesPage
                };
                window.onGamesViewChange(normalizedStateView, model.currentGamesPage);
                updateShellTitle();
                return;
            }

            const didNavigate = withFrame('games-frame', (win, doc) => {
                if (safeView === 'gnmath' && typeof win.openGNMath === 'function') {
                    win.openGNMath();
                    return;
                }
                if (typeof win.switchView === 'function') {
                    if (safeView === 'featured' && model.currentGamesPage && typeof win.openFeaturedGameByRouteId === 'function') {
                        win.openFeaturedGameByRouteId(model.currentGamesPage, { updateUrl: false });
                        return;
                    }
                    win.switchView(safeView);
                    return;
                }
                if (typeof win.router === 'function') {
                    win.router(safeView);
                    return;
                }
                const target = doc.getElementById(`view-${safeView}`);
                if (!target) return;
                doc.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
                target.classList.add('active');
            });

            if (!didNavigate) {
                frameState.pendingGamesView = {
                    view: safeView,
                    pageId: model.currentGamesPage
                };
            }

            window.onGamesViewChange(normalizedStateView, model.currentGamesPage);
            updateShellTitle();
        }

        function navigateTv(view, param) {
            const resolved = resolveTvNavigation(view, param);
            const safeView = resolved.view;
            const safeDetails = resolved.details;
            const normalizedStateView = normalizeTvStateView(safeView);

            model.currentTvView = normalizedStateView;
            model.currentTvDetails = normalizedStateView === 'details' ? safeDetails : null;

            if (!frameState.tvLoaded) {
                frameState.pendingTvNavigation = {
                    view: safeView,
                    details: safeDetails
                };
                window.onTvViewChange(normalizedStateView, model.currentTvDetails);
                updateShellTitle();
                return;
            }

            const didNavigate = withFrame('tv-frame', (win, doc) => {
                if (safeView === 'youtube' && typeof win.launchYoutubeTool === 'function') {
                    win.launchYoutubeTool();
                    return;
                }
                if (safeView === 'sports' && typeof win.launchSportsTool === 'function') {
                    win.launchSportsTool();
                    return;
                }
                if (typeof win.router === 'function') {
                    if (safeView === 'details' && safeDetails) {
                        win.router(safeView, safeDetails);
                    } else {
                        win.router(safeView);
                    }
                    return;
                }
                const target = doc.getElementById(`view-${safeView}`);
                if (!target) return;
                doc.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
                target.classList.add('active');
            });

            if (!didNavigate) {
                frameState.pendingTvNavigation = {
                    view: safeView,
                    details: safeDetails
                };
            }

            window.onTvViewChange(normalizedStateView, model.currentTvDetails);
            updateShellTitle();
        }

        window.onGamesViewChange = function (view, pageId) {
            const normalizedView = normalizeGamesStateView(view);
            if (!(validGamesViews.has(normalizedView) || specialGamesViews.has(normalizedView))) return;
            const normalizedPageId = normalizedView === 'featured' && typeof pageId === 'string'
                ? pageId.trim() || null
            : null;
            if (!frameState.gamesLoaded && !isApplyingRoute) {
                // Ignore child-app boot defaults that would overwrite an explicit route like gnmath.
                if (normalizedView === 'home' && model.currentGamesView !== 'home') {
                    return;
                }
                model.currentGamesView = normalizedView;
                model.currentGamesPage = normalizedView === 'featured' ? normalizedPageId : null;
                return;
            }
            const changed = model.currentGamesView !== normalizedView;
            const pageChanged = (model.currentGamesPage || null) !== (normalizedView === 'featured' ? normalizedPageId : null);
            model.currentGamesView = normalizedView;
            model.currentGamesPage = normalizedView === 'featured' ? normalizedPageId : null;
            if (!isApplyingRoute && model.mode === 'games') {
                const route = parseRouteFromUrl();
                const urlOutOfSync =
                    route.mode !== 'games' ||
                    route.gamesView !== normalizedView ||
                    ((route.gamesPage || null) !== (normalizedView === 'featured' ? normalizedPageId : null));
                if (changed || pageChanged || urlOutOfSync) {
                    syncUrlWithState(true);
                }
            }
            updateShellTitle();
        };

        window.onGamesFeaturedPageChange = function (pageId) {
            const normalizedPageId = typeof pageId === 'string' ? pageId.trim() : '';
            const nextPageId = normalizedPageId || null;
            const previousPageId = model.currentGamesPage || null;

            // Keep currentGamesPage in lockstep with game-details routing.
            model.currentGamesPage = nextPageId;

            if (!isApplyingRoute && model.mode === 'games') {
                const route = parseRouteFromUrl();
                const routePage = route.mode === 'games' ? (route.gamesPage || null) : null;
                const pageChanged = previousPageId !== nextPageId;
                const urlOutOfSync = routePage !== nextPageId;

                if (pageChanged || urlOutOfSync) {
                    syncUrlWithState(true);
                }
            }
        };

        window.onTvViewChange = function (view, param) {
            const normalizedView = normalizeTvStateView(view);
            if (!validTvViews.has(normalizedView)) return;

            if (!frameState.tvLoaded && !isApplyingRoute) {
                // Ignore child-app boot defaults that would overwrite explicit routes like sports/youtube.
                if (normalizedView === 'home' && model.currentTvView !== 'home') {
                    return;
                }
                model.currentTvView = normalizedView;
                if (normalizedView === 'details') {
                    model.currentTvDetails = normalizeTvDetails(param) || model.currentTvDetails;
                } else {
                    model.currentTvDetails = null;
                }
                return;
            }

            const previousView = model.currentTvView;
            const previousDetails = model.currentTvDetails;

            model.currentTvView = normalizedView;

            if (normalizedView === 'details') {
                model.currentTvDetails = normalizeTvDetails(param) || model.currentTvDetails;
            } else {
                model.currentTvDetails = null;
            }

            const changed = previousView !== model.currentTvView || !areTvDetailsEqual(previousDetails, model.currentTvDetails);
            if (!isApplyingRoute && model.mode === 'tv') {
                const route = parseRouteFromUrl();
                const urlOutOfSync =
                    route.mode !== 'tv' ||
                    route.tvView !== model.currentTvView ||
                    !areTvDetailsEqual(route.tvDetails, model.currentTvDetails);
                if (changed || urlOutOfSync) {
                    syncUrlWithState(true);
                }
            }
            updateShellTitle();
        };

        function switchMode(targetMode, shouldPush = true) {
            if (!validModes.has(targetMode)) return;
            if (targetMode === model.mode) return;

            const fromMode = model.mode;

            setTrackSettled(false);
            syncTrackTransform(false, fromMode);
            armTrackSettle(targetMode);

            model.mode = targetMode;
            document.body.setAttribute('data-mode', targetMode);
            updateModeDock();
            updateActivePane();

            // Start on a fresh frame so reverse transitions (TV -> Games) animate consistently.
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    syncTrackTransform(true, targetMode);
                });
            });

            if (targetMode === 'games') {
                navigateGames(model.currentGamesView, model.currentGamesPage);
            } else {
                navigateTv(model.currentTvView, model.currentTvDetails);
            }

            updateShellTitle();

            if (!isApplyingRoute && shouldPush) {
                syncUrlWithState(true);
            }
        }

        window.switchMode = switchMode;

        function wireEvents() {
            document.querySelectorAll('.mode-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    switchMode(chip.dataset.modeTarget);
                });
            });

            document.getElementById('games-frame').addEventListener('load', () => {
                frameState.gamesLoaded = true;
                const pendingGamesView = frameState.pendingGamesView;
                frameState.pendingGamesView = null;
                if (pendingGamesView && typeof pendingGamesView === 'object') {
                    navigateGames(pendingGamesView.view || model.currentGamesView, pendingGamesView.pageId || null);
                } else {
                    navigateGames(model.currentGamesView, model.currentGamesPage);
                }
            });

            document.getElementById('tv-frame').addEventListener('load', () => {
                frameState.tvLoaded = true;
                const pendingTvNavigation = frameState.pendingTvNavigation;
                frameState.pendingTvNavigation = null;
                if (pendingTvNavigation) {
                    navigateTv(pendingTvNavigation.view, pendingTvNavigation.details);
                } else {
                    navigateTv(model.currentTvView, model.currentTvDetails);
                }
            });
        }

        function init() {
            const initialRoute = parseRouteFromUrl();
            const shouldUseStoredRoute = !hasExplicitRouteInUrl();
            const storedRoute = shouldUseStoredRoute ? loadRouteSnapshot() : null;
            const resolvedInitialRoute = storedRoute || initialRoute;
            model.mode = resolvedInitialRoute.mode;
            model.currentGamesView = resolvedInitialRoute.gamesView;
            model.currentGamesPage = resolvedInitialRoute.gamesPage || null;
            model.currentTvView = resolvedInitialRoute.tvView;
            model.currentTvDetails = resolvedInitialRoute.tvDetails;

            document.body.setAttribute('data-mode', model.mode);
            syncTrackTransform(false);
            updateShellTitle();
            updateModeDock();
            updateActivePane();
            setTrackSettled(true);
            wireEvents();
            loadEmbeddedApps();
            syncUrlWithState(false);
            saveRouteSnapshot();

            window.addEventListener('popstate', () => {
                const route = parseRouteFromUrl();
                applyRouteState(route);
            });

            // Recover shell/nav sync when browser tab focus returns after heavy switching.
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) return;
                enforceShellLayoutIntegrity();

                if (model.mode === 'games') {
                    navigateGames(model.currentGamesView, model.currentGamesPage);
                } else {
                    navigateTv(model.currentTvView, model.currentTvDetails);
                }
            });

            setInterval(enforceShellLayoutIntegrity, 1200);
        }

        init();
    </script>
</body>
</html>
