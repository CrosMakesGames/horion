<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horion</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020408;
            --panel: rgba(0, 0, 0, 0.56);
            --panel-border: rgba(0, 180, 255, 0.2);
            --text: #e8f6ff;
            --muted: #7da8c2;
            --accent: #00b4ff;
            --accent-soft: rgba(0, 180, 255, 0.16);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            --radius: 14px;
        }

        body[data-mode="games"] {
            --bg: #020504;
            --panel: rgba(6, 12, 8, 0.6);
            --panel-border: rgba(40, 255, 140, 0.18);
            --text: #ecffee;
            --muted: #86b998;
            --accent: #34ff9a;
            --accent-soft: rgba(52, 255, 154, 0.15);
        }

        body[data-mode="tv"] {
            --bg: #03050d;
            --panel: rgba(5, 9, 18, 0.62);
            --panel-border: rgba(0, 170, 255, 0.22);
            --text: #eaf3ff;
            --muted: #88a8ce;
            --accent: #00b2ff;
            --accent-soft: rgba(0, 178, 255, 0.18);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            font-family: Inter, sans-serif;
            color: var(--text);
            background: var(--bg);
            direction: ltr;
        }

        body {
            transition: background 260ms ease;
            overflow-x: hidden;
        }

        .bg-noise,
        .bg-glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        .bg-glow {
            background:
                radial-gradient(circle at 12% 18%, var(--accent-soft), transparent 42%),
                radial-gradient(circle at 84% 14%, rgba(255, 255, 255, 0.08), transparent 38%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 30%);
            transition: background 260ms ease;
            z-index: -2;
        }

        .bg-noise {
            z-index: -1;
            opacity: 0.15;
            background-image: radial-gradient(rgba(255,255,255,0.14) 0.5px, transparent 0.5px);
            background-size: 3px 3px;
        }

        .mode-dock {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 30;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 999px;
            border: 1px solid var(--panel-border);
            background: rgba(2, 8, 18, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.38);
        }

        .mode-chip {
            border: 1px solid transparent;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-family: "JetBrains Mono", monospace;
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.11em;
            text-transform: uppercase;
            padding: 8px 14px;
            border-radius: 999px;
            transition: all 190ms ease;
        }

        .mode-chip:hover {
            color: var(--text);
            border-color: var(--panel-border);
            background: rgba(255, 255, 255, 0.06);
        }

        .mode-chip.active {
            color: #021218;
            border-color: transparent;
            background: linear-gradient(135deg, var(--accent), #8ff1ff);
            box-shadow: 0 0 18px rgba(0, 180, 255, 0.36);
        }

        .beta-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background: rgba(1, 8, 16, 0.68);
            backdrop-filter: blur(4px);
        }

        .beta-modal-overlay.active {
            display: flex;
        }

        .beta-modal {
            width: min(700px, 100%);
            border: 1px solid rgba(52, 255, 154, 0.34);
            border-radius: 16px;
            background:
                radial-gradient(circle at 82% 12%, rgba(52, 255, 154, 0.16), transparent 42%),
                radial-gradient(circle at 12% 88%, rgba(0, 178, 255, 0.14), transparent 48%),
                linear-gradient(160deg, rgba(4, 14, 20, 0.98), rgba(10, 22, 16, 0.96));
            box-shadow: 0 30px 56px rgba(0, 0, 0, 0.5);
            padding: 26px 24px;
            color: var(--text);
        }

        .beta-modal h3 {
            margin: 0 0 10px;
            font-size: 1.3rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #dfffe9;
        }

        .beta-modal p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
            font-size: 1rem;
            max-width: 62ch;
        }

        .beta-modal-actions {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .beta-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border-radius: 10px;
            padding: 11px 15px;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            border: 1px solid rgba(120, 168, 190, 0.52);
            color: #d9ecfb;
            background: rgba(16, 30, 38, 0.8);
        }

        .beta-link:hover {
            filter: brightness(1.08);
        }

        .beta-dismiss {
            border: 1px solid rgba(52, 255, 154, 0.55);
            background: linear-gradient(135deg, rgba(52, 255, 154, 0.34), rgba(0, 178, 255, 0.34));
            color: #001b11;
            border-radius: 10px;
            padding: 11px 18px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 18px rgba(52, 255, 154, 0.28);
        }

        .beta-dismiss:hover {
            filter: brightness(1.08);
        }

        @media (max-width: 640px) {
            .beta-modal {
                padding: 20px 18px;
            }

            .beta-modal h3 {
                font-size: 1.1rem;
            }

            .beta-modal-actions {
                flex-direction: column;
            }

            .beta-link,
            .beta-dismiss {
                width: 100%;
            }
        }

        .app-shell {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 0;
        }

        .surface {
            border: 0;
            border-radius: 0;
            background: transparent;
            box-shadow: none;
            overflow: hidden;
            min-height: 100vh;
        }

        .switch-track {
            position: relative;
            width: 200%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            transform: translateX(0);
        }

        body[data-mode="tv"] .switch-track { transform: translateX(-50%); }

        .switch-track.animate {
            transition: transform 220ms cubic-bezier(.22,1,.36,1);
        }

        .switch-track.settled {
            width: 100%;
            display: block;
            transform: translateX(0) !important;
            transition: none !important;
        }

        .switch-track.settled .mode-pane {
            display: none;
        }

        .switch-track.settled .mode-pane.active {
            display: block;
        }

        .mode-pane { min-height: 100vh; padding: 0; }

        .embed-wrap {
            width: 100%;
            height: 100vh;
            border: 0;
            border-radius: 0;
            overflow: hidden;
            background: transparent;
        }

        .app-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #000;
        }

        @media (max-width: 900px) {
            .mode-dock {
                left: 50%;
                right: auto;
                transform: translateX(-50%);
                bottom: 14px;
            }

            .mode-pane { padding: 0; }
            .embed-wrap { height: 100vh; }
            .mode-pane { min-height: 100vh; padding: 0; }
            .app-shell { padding: 0; }
        }
    </style>
</head>
<body data-mode="games">
    <div class="bg-glow" aria-hidden="true"></div>
    <div class="bg-noise" aria-hidden="true"></div>

    <main class="app-shell">
        <section class="surface">
            <div class="switch-track" id="switch-track">
                <section class="mode-pane active" aria-label="Games mode" data-mode-pane="games">
                    <div class="embed-wrap">
                        <iframe id="games-frame" class="app-frame" title="Horion Games"></iframe>
                    </div>
                </section>

                <section class="mode-pane" aria-label="TV mode" data-mode-pane="tv">
                    <div class="embed-wrap">
                        <iframe id="tv-frame" class="app-frame" title="Horion TV"></iframe>
                    </div>
                </section>
            </div>
        </section>
    </main>

    <div class="mode-dock" role="group" aria-label="Mode switch">
        <button class="mode-chip active" id="mode-games" data-mode-target="games" type="button" aria-pressed="true">Games</button>
        <button class="mode-chip" id="mode-tv" data-mode-target="tv" type="button" aria-pressed="false">TV</button>
    </div>

    <div id="beta-modal-overlay" class="beta-modal-overlay" aria-hidden="true">
        <div class="beta-modal" role="dialog" aria-modal="true" aria-labelledby="beta-modal-title">
            <h3 id="beta-modal-title">Horion 2.0 Beta</h3>
            <p>
                Horion 2.0 is currently in beta. You may run into bugs, broken pages, or random UI issues while testing.
                Please report anything you find so it can be fixed faster.
            </p>
            <div class="beta-modal-actions">
                <button id="beta-modal-close" class="beta-dismiss" type="button">Continue</button>
                <a class="beta-link" href="https://docs.google.com/forms/d/e/1FAIpQLSfB9PSqEptKQutHkIWXa8QjFNBELP1fGXX-q5lzFFelRvGqIg/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer">Open Bug Report Form</a>
            </div>
        </div>
    </div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">
    <style>
        /* --- ROOT VARIABLES --- */
:root {
    --hacker-blue: #0070FF;
    --neon-blue: #00E5FF;
    --bg-dark: #000000;
    --text-grey: #445566;
    --warning-gold: #FFC107;
    --heart-red: #FF0050; /* Deeper, TikTok-style red */
}

/* --- BODY --- */
body {
    margin: 0;
    background-color: var(--bg-dark);
    font-family: 'Inter', sans-serif;
    color: white;
    overflow-x: hidden;
    overflow-y: scroll;
    scroll-behavior: smooth;
}

/* --- BOOTUP OVERLAY --- */
#boot-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #020205;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.5s ease, visibility 0.5s;
}

.boot-text {
    font-family: 'JetBrains Mono', monospace;
    color: var(--neon-blue);
    letter-spacing: 4px;
    margin-bottom: 20px;
    font-size: 0.9rem;
    text-transform: uppercase;
    animation: pulseText 2s infinite;
}

@keyframes pulseText {
    0% { opacity: 0.7; }
    50% { opacity: 1; text-shadow: 0 0 10px var(--neon-blue); }
    100% { opacity: 0.7; }
}

.progress-container {
    width: 300px;
    height: 3px;
    background: rgba(0, 112, 255, 0.15);
    position: relative;
    border-radius: 2px;
    overflow: hidden;
}

.progress-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 0%;
    height: 100%;
    background: var(--neon-blue);
    box-shadow: 0 0 20px var(--neon-blue);
    transition: width 0.1s linear;
}

/* --- NAVBAR --- */
.hud-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
    background: rgba(0, 5, 15, 0.8);
    border-bottom: 1px solid rgba(0, 112, 255, 0.15);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(5px);
}

.nav-logo {
    font-size: 3rem;
    font-weight: 100;
    letter-spacing: 12px;
    text-decoration: none;
    color: white;
    transition: 0.4s ease;
}

.nav-logo:hover { color: var(--neon-blue); cursor: pointer; }

.nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

.taskbar-pins {
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav-item.pinned-app-btn {
    color: #07c8d9 !important;
    font-weight: 900 !important;
    text-shadow: 0 0 8px rgba(154, 247, 255, 0.55);
}

.nav-item {
    text-decoration: none;
    color: white;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 4px;
    transition: 0.3s;
    padding: 10px 20px;
    display: inline-block;
}

.nav-item.more {
    font-size: 11px;
    color: var(--text-grey);
    letter-spacing: 2px;
}

.nav-item:hover { color: var(--neon-blue); cursor: pointer;}
.nav-item.active { color: var(--hacker-blue); border-bottom: 1px solid var(--hacker-blue); }
.nav-item.more.active { color: var(--hacker-blue); border-bottom: 1px solid var(--hacker-blue); }
.nav-item.hidden { display: none; }

/* --- CONTENT CONTAINER --- */
.content-container {
    max-width: 1200px;
    margin: 40px auto;
    padding: 60px 40px;
    position: relative;
    z-index: 1;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(0, 112, 255, 0.1);
    border-radius: 4px;
    backdrop-filter: blur(2px);
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    box-sizing: border-box;
}

/* --- HOMEPAGE SPECIFICS --- */
.home-title {
    font-size: 4rem;
    font-weight: 100;
    letter-spacing: 15px;
    color: var(--neon-blue);
    margin: 0;
    text-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
}

.home-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: #334455;
    text-decoration: none;
    margin-top: 10px;
    margin-bottom: 30px;
    letter-spacing: 2px;
    transition: 0.3s;
    cursor: pointer;
}

.home-subtitle:hover {
    color: var(--hacker-blue);
    text-decoration: underline;
    text-shadow: 0 0 5px var(--hacker-blue);
}

/* --- DISCLAIMER BOX --- */
.disclaimer-box {
    background: rgba(255, 193, 7, 0.05);
    border: 1px solid rgba(255, 193, 7, 0.4);
    padding: 25px;
    margin-bottom: 40px;
    border-radius: 6px;
    max-width: 650px;
    width: 90%;
    box-shadow: 0 0 20px rgba(255, 193, 7, 0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.disclaimer-text {
    color: var(--warning-gold);
    font-size: 1.1rem;
    font-weight: 600;
    margin: 0;
    line-height: 1.5;
    text-shadow: 0 0 10px rgba(255, 193, 7, 0.3);
}

.doc-btn {
    display: inline-block;
    padding: 10px 25px;
    background: rgba(255, 193, 7, 0.1);
    border: 1px solid var(--warning-gold);
    color: var(--warning-gold);
    font-family: 'JetBrains Mono', monospace;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 1px;
    transition: 0.3s;
    border-radius: 2px;
}

.doc-btn:hover {
    background: var(--warning-gold);
    color: black;
    box-shadow: 0 0 20px rgba(255, 193, 7, 0.4);
    transform: translateY(-2px);
}

/* --- BUTTONS --- */
.button-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 50px;
}

.btn-row {
    display: flex;
    gap: 15px;
    justify-content: center;
}

.action-btn {
    flex: 1;
    padding: 15px 0;
    background: rgba(0, 112, 255, 0.1);
    border: 1px solid var(--hacker-blue);
    color: white;
    font-family: 'JetBrains Mono', monospace;
    text-decoration: none;
    letter-spacing: 2px;
    font-size: 0.9rem;
    transition: 0.3s;
    text-align: center;
}

.action-btn:hover {
    background: var(--hacker-blue);
    color: white;
    box-shadow: 0 0 15px var(--hacker-blue);
    cursor: pointer;
}

.secondary-btn {
    width: 100%;
    padding: 10px 0;
    background: transparent;
    border: 1px solid #334455;
    color: #667788;
    font-family: 'JetBrains Mono', monospace;
    text-decoration: none;
    letter-spacing: 2px;
    font-size: 0.8rem;
    transition: 0.3s;
    text-align: center;
    cursor: pointer;
}

.secondary-btn:hover {
    border-color: var(--hacker-blue);
    color: var(--neon-blue);
}

/* --- DESCRIPTION & RECENT CHANGES --- */
.description-area {
    font-size: 1rem;
    line-height: 1.6;
    color: #cccccc;
    max-width: 600px;
    margin-bottom: 50px;
    font-weight: 300;
}

.recent-changes-container {
    width: 100%;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 20px;
    text-align: left;
}

.recent-label {
    color: var(--neon-blue);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    margin-bottom: 10px;
}

.change-log {
    color: #8899aa;
    font-size: 0.9rem;
    font-weight: 300;
}

/* --- SEARCH BAR --- */
#searchBar {
    width: 100%;
    box-sizing: border-box;
    background: rgba(0, 5, 15, 0.8);
    border: 1px solid var(--hacker-blue);
    padding: 20px;
    margin-bottom: 30px;
    color: white;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 2px;
    outline: none;
    border-radius: 4px;
    font-size: 1rem;
}

#searchBar:focus {
    box-shadow: 0 0 15px rgba(0, 112, 255, 0.2);
    border-color: var(--neon-blue);
}

/* --- GAME GRID --- */
.game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 20px;
}

.game-card {
    position: relative;
    aspect-ratio: 1 / 1;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(0, 112, 255, 0.15);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}

.game-card:hover {
    transform: translateY(-5px);
    border-color: var(--neon-blue);
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
}

.game-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: filter 0.3s ease, transform 0.5s ease;
}

.card-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s ease;
    padding: 10px;
    box-sizing: border-box;
}

.game-title {
    color: var(--neon-blue);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    text-align: center;
    font-size: 1rem;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.game-card:hover img {
    filter: brightness(0.3) blur(2px);
    transform: scale(1.1);
    cursor: pointer;
}

.game-card:hover .card-overlay {
    opacity: 1;
}

/* --- FAV HEART (FEATURED) --- */
.fav-star-featured {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 20;
    width: 32px;       /* Fixed size for SVG */
    height: 32px;
    opacity: 0;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s, filter 0.2s;
    filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
}

.special-web-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 18;
    display: block;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 1.8rem;
    font-weight: 900;
    line-height: 0.85;
    transform: scaleX(1.24);
    transform-origin: top left;
    -webkit-text-stroke: 1px rgba(0, 0, 0, 0.45);
    text-shadow: 0 0 1px rgba(0, 0, 0, 0.4);
    pointer-events: none;
}

/* SVG Styling inside the container */
.fav-star-featured path {
    fill: rgba(0, 0, 0, 0.3); /* Semi-transparent dark fill by default */
    stroke: white;            /* White outline to be visible on images */
    stroke-width: 2px;
    transition: fill 0.2s, stroke 0.2s;
}

.game-card:hover .fav-star-featured {
    opacity: 1;
}

.fav-star-featured:hover {
    transform: scale(1.2);
}

/* ACTIVE (LIKED) STATE */
.fav-star-featured.active {
    opacity: 1;
    transform: scale(1.1);
    /* The glow effect around the whole shape */
    filter: drop-shadow(0 0 10px var(--heart-red)); 
}

.fav-star-featured.active path {
    fill: var(--heart-red);   /* The Red Fill */
    stroke: black;            /* The Black Outline requested */
    stroke-width: 1.5px;
}

/* --- MORE PAGE --- */
.section-header {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 8px;
    color: white;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--hacker-blue);
    padding-bottom: 10px;
    width: 100%;
    text-align: center;
}

.info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    max-width: 600px;
    margin-bottom: 40px;
}

.info-card {
    background: rgba(0, 112, 255, 0.05);
    border: 1px solid rgba(0, 112, 255, 0.2);
    padding: 20px;
    text-align: left;
    transition: 0.3s;
}

.info-card:hover {

.buttons-container {

}

.db-item-wrapper {
    position: relative;
    width: 100%;
    display: flex;
    transition: transform 0.2s ease;
}

.db-item-wrapper:hover {
    transform: translateY(-2px);
}

.db-btn {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    color: #ccc;
    padding: 14px 40px 14px 14px; /* Right padding for heart */
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    text-align: left;
    border-radius: 2px;
    text-transform: capitalize;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    width: 100%;
}

.db-item-wrapper:hover .db-btn {
    background: rgba(0, 112, 255, 0.1);
    color: var(--neon-blue);
    border-color: var(--hacker-blue);
}

.fav-star-db {
    position: absolute;
    right: 15px; 
    top: 50%;
    transform: translateY(-50%);
    width: 24px;
    height: 24px;
    cursor: pointer;
    z-index: 5;
    transition: transform 0.2s;
}

.fav-star-db path {
    fill: transparent;
    stroke: #666;
    stroke-width: 2px;
    transition: all 0.2s;
}

.fav-star-db:hover {
    transform: translateY(-50%) scale(1.2);
}
.fav-star-db:hover path {
    stroke: white;
}

.fav-star-db.active path {
    fill: var(--heart-red);
    stroke: black; /* Outline */
    stroke-width: 1.5px;
}
.fav-star-db.active {
    filter: drop-shadow(0 0 8px var(--heart-red));
}

.view-section {
    display: none; /* hide all sections by default */
}

.view-section.active {

}

    let launchedFromAboutBlankBridge = false;

    function getRuntimeHostHref() {
        const candidates = [];

        try {
            if (window.top && window.top.location && window.top.location.href) {
                candidates.push(window.top.location.href);
            }
        } catch (err) {
            // Ignore cross-frame access failures.
        }

        try {
            if (window.parent && window.parent.location && window.parent.location.href) {
                candidates.push(window.parent.location.href);

            // Ignore cross-frame access failures.
        }

        if (document.referrer) {
            candidates.push(document.referrer);
        }

        if (window.location && window.location.href) {
            candidates.push(window.location.href);
        }

        for (const href of candidates) {
            if (typeof href === 'string' && href.trim()) {
                return href.trim();
            }
        }

        return '';

    function isAboutLaunchHref(href) {
        if (launchedFromAboutBlankBridge) {
            return true;

        const value = String(href || '').trim().toLowerCase();
        return value.startsWith('about:');

    function buildProxiedAboutBlankHtml(html, baseUrl) {
    const safeBase = String(baseUrl).replace(/"/g, '&quot;');
    const baseTag = `<base href="${safeBase}" target="_self">`;

        const sanitizedHtml = String(html)
            .replace(/<meta[^>]*http-equiv=["']content-security-policy["'][^>]*>/gi, '')
            .replace(/<meta[^>]*http-equiv=["']x-content-security-policy["'][^>]*>/gi, '')
            .replace(/<base[^>]*>/gi, '');

    const navigationGuard = `
<script>
(function () {
    const toAbsoluteUrl = function (value) {
        try {
            return new URL(value, document.baseURI).href;
        } catch (error) {
            return null;
        }
    };

    const isSpecialHref = function (href) {
        if (!href) return true;
        const lower = String(href).trim().toLowerCase();
        return (
            lower.startsWith('#') ||
            lower.startsWith('javascript:') ||
            lower.startsWith('mailto:') ||
            lower.startsWith('tel:')
        );
    };

    const navigateInsideAboutBlank = function (url) {
        if (!url || typeof window.__horionNavigate !== 'function') return;
        window.__horionNavigate(url);
    };

    const forceSameTabTargets = function () {
        document.querySelectorAll('a[target], form[target]').forEach(function (node) {
            node.setAttribute('target', '_self');
        });
    };

    const patchLocationMethod = function (methodName) {
        const original = window.location[methodName];
        if (typeof original !== 'function') return;
        window.location[methodName] = function (url) {
            const resolved = toAbsoluteUrl(url || '');
            if (resolved) {
                navigateInsideAboutBlank(resolved);
                return;
            }
            return original.apply(window.location, arguments);
        };
    };

    const originalOpen = window.open;
    window.open = function (url) {
        const resolved = toAbsoluteUrl(url || '');
        if (resolved) {
            navigateInsideAboutBlank(resolved);
            return window;
        }
        return originalOpen ? originalOpen.apply(window, arguments) : window;
    };

    const originalPushState = history.pushState;
    history.pushState = function (state, title, url) {
        if (typeof url === 'string' && url.length > 0) {
            const resolved = toAbsoluteUrl(url);
            if (resolved) {
                navigateInsideAboutBlank(resolved);
                return;
            }
        }
        return originalPushState.apply(history, arguments);
    };

    const originalReplaceState = history.replaceState;
    history.replaceState = function (state, title, url) {
        if (typeof url === 'string' && url.length > 0) {
            const resolved = toAbsoluteUrl(url);
            if (resolved) {
                navigateInsideAboutBlank(resolved);
                return;
            }
        }
        return originalReplaceState.apply(history, arguments);
    };

    patchLocationMethod('assign');
    patchLocationMethod('replace');

    document.addEventListener('click', function (event) {
        const target = event.target && event.target.closest ? event.target.closest('a[href], button[data-href], [data-href]') : null;
        if (!target) return;

        const href = target.getAttribute('href') || target.getAttribute('data-href');
        if (isSpecialHref(href)) return;

        const resolved = toAbsoluteUrl(href);
        if (!resolved) return;

        event.preventDefault();
        navigateInsideAboutBlank(resolved);
    }, true);

    document.addEventListener('submit', function (event) {
        const form = event.target;
        if (!form || !form.getAttribute) return;

        const method = (form.getAttribute('method') || 'get').toLowerCase();
        const action = form.getAttribute('action') || window.location.href;
        const resolvedAction = toAbsoluteUrl(action);
        if (!resolvedAction) return;

        if (method === 'get') {
            event.preventDefault();
            const formData = new FormData(form);
            const params = new URLSearchParams(formData);
            const nextUrl = new URL(resolvedAction);
            params.forEach(function (value, key) {
                nextUrl.searchParams.set(key, value);
            });
            navigateInsideAboutBlank(nextUrl.href);
        }
    }, true);

    forceSameTabTargets();
    const observer = new MutationObserver(forceSameTabTargets);
    observer.observe(document.documentElement, { childList: true, subtree: true });
})();
<\/script>`;

    if (/<head[^>]*>/i.test(sanitizedHtml)) {
        return sanitizedHtml.replace(/<head[^>]*>/i, function (match) {
            return match + baseTag + navigationGuard;
        });
    }

    return baseTag + navigationGuard + sanitizedHtml;
}

function openInlinePage(targetUrl, titleText, options) {
    const normalizedUrl = String(targetUrl || '').trim();

    const existing = document.getElementById('horion-inline-page');
    if (existing) existing.remove();

    const host = document.createElement('section');
    host.id = 'horion-inline-page';
    host.style.position = 'fixed';
    host.style.left = '0';
    host.style.right = '0';
    host.style.bottom = '0';
    host.style.zIndex = '9990';
    host.style.background = '#000';
    host.style.borderTop = '1px solid rgba(0, 112, 255, 0.25)';

    host.innerHTML = `
        <iframe
            id="horion-inline-host-frame"
            src="about:blank"
            allow="autoplay; fullscreen; xr-spatial-tracking; encrypted-media; clipboard-read; clipboard-write; display-capture"
            allowfullscreen
            style="border:none;width:100%;height:100%;background:#000;"
        ></iframe>
    `;

    const applyOffset = function () {
        const nav = document.querySelector('.hud-nav');
        const top = nav ? Math.max(0, Math.round(nav.getBoundingClientRect().bottom)) : 0;
        host.style.top = top + 'px';
    };

    const closeInlineView = function () {
        window.removeEventListener('resize', applyOffset);
        document.removeEventListener('keydown', onKeydown);
        host.remove();
    };

    const onKeydown = function (event) {
        if (event.key === 'Escape') closeInlineView();
    };

    document.body.appendChild(host);
    const hostFrame = document.getElementById('horion-inline-host-frame');
    if (hostFrame && hostFrame.contentWindow && hostFrame.contentWindow.document) {
        const wrapperHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${String(titleText || 'Extension')}</title><base target="_self"><style>html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}iframe{border:none;width:100%;height:100%;background:#000}</style></head><body><iframe src="${normalizedUrl}" allow="autoplay; fullscreen; xr-spatial-tracking; encrypted-media; clipboard-read; clipboard-write; display-capture; gamepad; picture-in-picture; screen-wake-lock" allowfullscreen></iframe></body></html>`;
        hostFrame.contentWindow.document.open();
        hostFrame.contentWindow.document.write(wrapperHtml);
        hostFrame.contentWindow.document.close();
    }

    applyOffset();
    window.addEventListener('resize', applyOffset);
    document.addEventListener('keydown', onKeydown);

    return true;
}

const GN_MATH_PRIMARY_URL = 'https://gn-math.dev/';
const GN_MATH_FALLBACK_URL = 'https://gn-math.github.io/gn-math-DONTDMCA/';

function probeUrlReachable(targetUrl, timeoutMs) {
    const safeUrl = String(targetUrl || '').trim();
    const safeTimeout = Number(timeoutMs) > 0 ? Number(timeoutMs) : 3500;
    if (!safeUrl) return Promise.resolve(false);

    return new Promise((resolve) => {
        let didResolve = false;
        const finish = (value) => {
            if (didResolve) return;
            didResolve = true;
            resolve(Boolean(value));
        };

        const controller = typeof AbortController === 'function' ? new AbortController() : null;
        const timer = setTimeout(() => {
            if (controller) controller.abort();
            finish(false);
        }, safeTimeout);

        fetch(safeUrl, {
            method: 'GET',
            mode: 'no-cors',
            cache: 'no-store',
            signal: controller ? controller.signal : undefined
        })
            .then(() => finish(true))
            .catch(() => finish(false))
            .finally(() => clearTimeout(timer));
    });
}

function openGNMathWithFallback() {
    return probeUrlReachable(GN_MATH_PRIMARY_URL, 3500)
        .then((isPrimaryReachable) => {
            const launchUrl = isPrimaryReachable ? GN_MATH_PRIMARY_URL : GN_MATH_FALLBACK_URL;
            return openInlinePage(launchUrl, 'GN-Math', { blockNewTabs: true });
        })
        .catch(() => openInlinePage(GN_MATH_FALLBACK_URL, 'GN-Math', { blockNewTabs: true }));
}

function openSpecial(gamelink, gameTitle) {
    const rawLink = String(gamelink || '').trim();
    if (!rawLink) return;

    if (/^https?:\/\//i.test(rawLink)) {
        launchSite(rawLink, gameTitle);
        return;
    }

    const baseCandidates = [];
    try {
        if (window.parent && window.parent !== window && window.parent.location && window.parent.location.href) {
            baseCandidates.push(window.parent.location.href);
        }
    } catch (err) {
        // Ignore cross-frame location issues.
    }
    baseCandidates.push(document.referrer || '');
    baseCandidates.push(window.location.href || '');

    for (const base of baseCandidates) {
        if (!base || /^about:/i.test(base)) continue;
        try {
            const absoluteLink = new URL(rawLink, base).href;
            launchSite(absoluteLink, gameTitle);
            return;
        } catch (err) {
            // Try next base candidate.
        }
    }

    alert('Unable to resolve web game path: ' + rawLink);
} 

    // ==========================================
    // 5. PARTICLE SYSTEM
    // ==========================================
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    document.body.appendChild(canvas);
    let particles = [];
    const mouse = { x: null, y: null, radius: 100 };
    window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y; this.baseX = x; this.baseY = y;
            this.size = 1.5; this.density = (Math.random() * 20) + 2;
        }
        draw() {
            ctx.fillStyle = 'rgba(0, 229, 255, 0.8)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
        update() {
            let dx = mouse.x - this.x; let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < mouse.radius) {
                const force = (mouse.radius - distance) / mouse.radius;
                const directionX = (dx / distance) * force * this.density;
                const directionY = (dy / distance) * force * this.density;
                this.x -= directionX; this.y -= directionY;
            } else {
                if (this.x !== this.baseX) this.x -= (this.x - this.baseX) / 10;
                if (this.y !== this.baseY) this.y -= (this.y - this.baseY) / 10;
            }
        }
    }

    function initParticles() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 180; i++) {
            particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
            particles[i].draw(); particles[i].update();
            for (let j = i; j < particles.length; j++) {
                let dx = particles[i].x - particles[j].x;
                let dy = particles[i].y - particles[j].y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    ctx.strokeStyle = `rgba(0, 112, 255, ${1 - dist/120})`;
                    ctx.lineWidth = 0.5; ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                }
            }
        }
        requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => { initParticles(); });
    initParticles(); animateParticles();

    // ==========================================
    // 6. INITIALIZATION & SEARCH
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
        applyRuntimeLaunchNotice();

        if (taskbarTarget && !extensions.some(ext => ext.id === taskbarTarget)) {

            });

            const search = e.target.value.toLowerCase();
            document.querySelectorAll('#sections-container .db-btn').forEach(btn => {
                const wrapper = btn.parentElement;
                wrapper.style.display = btn.value.toLowerCase().includes(search) ? 'flex' : 'none';
            });
        });

        const bar = document.getElementById('bootBar');
        const overlay = document.getElementById('boot-overlay');
        let width = 0;
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.visibility = 'hidden'; }, 500);
            } else {
                width += Math.random() * 5;

<script type="text/javascript">
    // ==========================================
    // 1. HORION VISUALS (Particles & Boot)
    // ==========================================
    const tvCanvas = document.createElement('canvas');
    tvCanvas.id = 'bg-canvas';
    const tvCtx = tvCanvas.getContext('2d');
    document.body.appendChild(tvCanvas);
    
    let tvParticles = [];
    const tvMouse = { x: null, y: null, radius: 150 };
    window.addEventListener('mousemove', (e) => { tvMouse.x = e.x; tvMouse.y = e.y; });

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y; this.baseX = x; this.baseY = y;
            this.size = 1.5; this.density = (Math.random() * 20) + 2;
        }
        draw() {
            tvCtx.fillStyle = 'rgba(0, 112, 255, 0.5)';
            tvCtx.beginPath(); tvCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); tvCtx.fill();
        }
        update() {
            let dx = tvMouse.x - this.x; let dy = tvMouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < tvMouse.radius) {
                const force = (tvMouse.radius - distance) / tvMouse.radius;
                const directionX = (dx / distance) * force * this.density;
                const directionY = (dy / distance) * force * this.density;
                this.x -= directionX; this.y -= directionY;
            } else {
                if (this.x !== this.baseX) this.x -= (this.x - this.baseX) / 10;
                if (this.y !== this.baseY) this.y -= (this.y - this.baseY) / 10;
            }
        }
    }

    function initParticles() {
        tvCanvas.width = window.innerWidth; tvCanvas.height = window.innerHeight;
        tvParticles = [];
        for (let i = 0; i < 150; i++) {
            tvParticles.push(new Particle(Math.random() * tvCanvas.width, Math.random() * tvCanvas.height));
        }
    }

    function animateParticles() {
        tvCtx.clearRect(0, 0, tvCanvas.width, tvCanvas.height);
        for (let i = 0; i < tvParticles.length; i++) {
            tvParticles[i].draw(); tvParticles[i].update();
            for (let j = i; j < tvParticles.length; j++) {
                let dx = tvParticles[i].x - tvParticles[j].x;
                let dy = tvParticles[i].y - tvParticles[j].y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 100) {
                    tvCtx.strokeStyle = `rgba(0, 112, 255, ${0.5 - dist/100})`;
                    tvCtx.lineWidth = 0.5; tvCtx.beginPath();
                    tvCtx.moveTo(tvParticles[i].x, tvParticles[i].y);
                    tvCtx.lineTo(tvParticles[j].x, tvParticles[j].y); tvCtx.stroke();
                }
            }
        }
        requestAnimationFrame(animateParticles);
    }

                }, 500);

                bar.style.width = width + '%';

    });


    // ==========================================
    // 2. STREAMVAULT & STATE LOGIC (TMDB Integration)
    // ==========================================
const TMDB_API_KEY = '15d2ea6d0dc1d476efbca3eba2b9bbfb'; // Public demo key
    const TMDB_BASE = 'https://api.themoviedb.org/3';
    const IMG_BASE = 'https://image.tmdb.org/t/p/w500';
    const IMG_ORIGINAL = 'https://image.tmdb.org/t/p/original';

    const state = {
        currentShow: null,
        currentSeason: 1,
        currentEpisode: null,
        currentServer: 'server1', 
        trending: [],
        browseDefault: [], // Used for top 50 TMDB items
        posterFallback: 'https://via.placeholder.com/300x450/000000/0070FF?text=No+Poster',
        heroFallback: 'https://via.placeholder.com/1200x600/000000/0070FF?text=No+Image'
    };

    function normalizeTMDB(item) {
        if (item.media_type !== 'movie' && item.media_type !== 'tv') return null;
        const year = (item.release_date || item.first_air_date || '').split('-')[0] || '';
        const hasRating = typeof item.vote_average === 'number' && item.vote_average > 0;
        return {
            id: item.id,
            type: item.media_type,
            title: item.title || item.name,
            year,
            rating: hasRating ? item.vote_average.toFixed(1) : '',
            summary: item.overview,
            poster: item.poster_path ? `${IMG_BASE}${item.poster_path}` : state.posterFallback,

        };
    }

    // --- Utility Method to Randomize Arrays ---
    function shuffleList(array) {
        const shuffled = [...array]; 
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;

    const ShowService = {
        fetchHomeData: async () => {
            const myFeaturedList = [
    // --- Your Original List ---
    { id: 1434, type: 'tv' },       // Family Guy
    { id: 66732, type: 'tv' },      // Stranger Things
    { id: 1396, type: 'tv' },       // Breaking Bad
    { id: 97546, type: 'tv' },      // Ted Lasso
    { id: 507089, type: 'movie' },  // Five Nights at Freddy's
    { id: 1405, type: 'tv' },       // Dexter
    { id: 95557, type: 'tv' },      // Invincible
    { id: 2604, type: 'tv' },       // The Boondocks

    { id: 1408, type: 'tv' },       // House M.D.
    { id: 1402, type: 'tv' },       // The Walking Dead
    { id: 245927, type: 'tv' },     // Paradise
    { id: 1317288, type: 'movie' }, // Marty Supreme

    { id: 100088, type: 'tv' },     // The Last of Us
    { id: 76479, type: 'tv' },      // The Boys
    { id: 60059, type: 'tv' },      // Better Call Saul
    { id: 106379, type: 'tv' },     // Fallout
    { id: 105248, type: 'tv' },     // Cyberpunk: Edgerunners

    { id: 1100, type: 'tv' },       // How I Met Your Mother

    { id: 250307, type: 'tv' },     // The Pitt
    { id: 687163, type: 'movie' },  // Project Hail Mary
    { id: 124364, type: 'tv' }      // FROM
];
            // 1. Randomize the list
            const randomizedList = shuffleList(myFeaturedList);
            
            // 2. Create an array of pending promises
            const fetchPromises = randomizedList.map(item => 
                ShowService.getDetails(item.id, item.type)
            );
            
            // 3. Wait for all of them to finish at the same time
            const results = await Promise.all(fetchPromises);
            
            return results;
        },

        fetchTopContent: async () => {
            const promises = [1, 2, 3].map(page => 
                fetch(`${TMDB_BASE}/trending/all/week?api_key=${TMDB_API_KEY}&page=${page}`).then(r=>r.json())
            );
            const results = await Promise.all(promises);
            const combined = results.flatMap(res => res.results);
            
            return combined.map(normalizeTMDB).filter(i => i !== null).slice(0, 50);
        },

        searchShows: async (query) => {
            if(!query) return [];
            const res = await fetch(`${TMDB_BASE}/search/multi?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&include_adult=false`);
            const data = await res.json();
            return data.results
                .filter(item => item.adult !== true)
                .map(normalizeTMDB)
                .filter(i => i !== null);
        },
        getDetails: async (id, type) => {
            const res = await fetch(`${TMDB_BASE}/${type}/${id}?api_key=${TMDB_API_KEY}&append_to_response=external_ids`);
            const data = await res.json();
            const year = (data.release_date || data.first_air_date || '').split('-')[0] || '';
            const hasRating = typeof data.vote_average === 'number' && data.vote_average > 0;
            
            const normalized = {
                id: data.id,
                type: type,
                imdbId: data.external_ids?.imdb_id || null,
                tmdbId: data.id,
                title: data.title || data.name,
                rating: hasRating ? data.vote_average.toFixed(1) : '',
                year,
                description: data.overview || 'No description available.',
                poster: data.poster_path ? `${IMG_BASE}${data.poster_path}` : state.posterFallback,
                backdrop: data.backdrop_path ? `${IMG_ORIGINAL}${data.backdrop_path}` : state.heroFallback,
                totalSeasons: data.number_of_seasons || 1,
                episodes: {}
            };
            return normalized;
        },
        getSeasonEpisodes: async (tvId, seasonNumber) => {
            const res = await fetch(`${TMDB_BASE}/tv/${tvId}/season/${seasonNumber}?api_key=${TMDB_API_KEY}`);
            const data = await res.json();
            if (!data.episodes) return [];
            return data.episodes.map(ep => ({
                number: ep.episode_number,
                title: ep.name,
                overview: ep.overview,
                image: ep.still_path ? `${IMG_BASE}${ep.still_path}` : null
            }));
        }
    };
    // ==========================================
    // 3. LOCAL STORAGE SAVE LOGIC
    // ==========================================
    
    window.addEventListener('beforeunload', saveProgress);

    function saveProgress() {
        if (!state.currentShow) return;
        if (state.currentShow.type === 'tv' && !state.currentEpisode) return;

        try {
            const cw = JSON.parse(localStorage.getItem('horion_cw') || '[]');
            const record = {
                id: state.currentShow.id,
                type: state.currentShow.type,
                title: state.currentShow.title,
                poster: state.currentShow.poster,
                season: state.currentShow.type === 'tv' ? state.currentSeason : null,
                episodeNumber: state.currentShow.type === 'tv' ? state.currentEpisode.number : null,
                timestamp: Date.now()
            };

            const filtered = cw.filter(item => item.id !== record.id);
            filtered.unshift(record);
            if (filtered.length > 20) filtered.pop();

            localStorage.setItem('horion_cw', JSON.stringify(filtered));
        } catch (e) {
            console.warn("Local storage save failed.", e);
        }
    }

    function getContinueWatching() {
        try {
            return JSON.parse(localStorage.getItem('horion_cw') || '[]');
        } catch (e) {
            return [];
        }
    }

    // ==========================================
    // 4. CONTROLLER & ROUTER
    // ==========================================
    
    function router(viewName, param) {
        const inlinePage = document.getElementById('horion-tv-inline-page');
        if (inlinePage) inlinePage.remove();

        if (viewName !== 'details' && state.currentShow) {
            saveProgress();
            state.currentShow = null; 
            state.currentEpisode = null;
        }

        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        
        const target = document.getElementById(`view-${viewName}`);
        if(target) target.classList.add('active');

        const navBtn = document.getElementById(`nav-${viewName}`);
        if(navBtn) navBtn.classList.add('active');

        window.scrollTo(0,0);

        if(viewName === 'home') {
            if(state.trending.length === 0) initHome();
        } else if(viewName === 'browse') {
            document.getElementById('browse-search').focus();
            const grid = document.getElementById('browse-grid');
            
            // Generate Top 50 default list instead of featured list
            if(state.browseDefault.length === 0) {
                grid.innerHTML = '<div style="color:var(--neon-blue); font-family:\'JetBrains Mono\'; grid-column: 1/-1;">LOADING TOP 50 DATABASE...</div>';
                ShowService.fetchTopContent().then(results => {
                    state.browseDefault = results;
                    if(document.getElementById('browse-search').value.trim() === '') {
                        renderGrid(state.browseDefault, 'browse-grid');
                    }
                });
            } else if (document.getElementById('browse-search').value.trim() === '') {
                renderGrid(state.browseDefault, 'browse-grid');
            }
            
        } else if(viewName === 'continue') {
            renderContinueWatching();
        } else if(viewName === 'details' && param) {
            loadMedia(param);
        }

        const viewTitleMap = {
            home: 'Horion TV',
            browse: 'Horion TV - Browse',
            continue: 'Horion TV - Continue Watching',
            details: 'Horion TV'
        };
        if (viewName !== 'details') {
            document.title = viewTitleMap[viewName] || 'Horion TV';
        }

        try {
            if (window.parent && window.parent !== window && typeof window.parent.onTvViewChange === 'function') {
                window.parent.onTvViewChange(viewName, param || null);
            }
        } catch (err) {
            // Ignore parent messaging errors.
        }
    }

    function setTvTaskbarHighlight(buttonId) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const targetBtn = document.getElementById(buttonId);
        if (targetBtn) targetBtn.classList.add('active');
    }

    async function initHome() {
        try {
            const shows = await ShowService.fetchHomeData();
            state.trending = shows;
            renderHero(shows[0]);
            renderGrid(shows.slice(1), 'trending-grid');
        } catch (e) {
            console.error(e);
        }
    }

    async function loadMedia({ id, type, season, epNumber }) {
        document.getElementById('view-details').innerHTML = '<div style="text-align:center; padding:50px; color:var(--neon-blue);">ACCESSING DATA...</div>';
        
        try {
            state.currentShow = await ShowService.getDetails(id, type);
            
            if (type === 'tv') {
                const targetSeason = season || 1;
                state.currentSeason = targetSeason;
                
                const eps = await ShowService.getSeasonEpisodes(id, targetSeason);
                state.currentShow.episodes[targetSeason] = eps;

                if (epNumber) {
                    state.currentEpisode = eps.find(e => e.number === epNumber) || eps[0];
                } else {
                    state.currentEpisode = eps[0] || { number: 1, title: 'Unavailable' };
                }
            } else {
                saveProgress();
            }
            
            renderDetailsView();

            if (state.currentShow && state.currentShow.title) {
                document.title = `${state.currentShow.title} - Horion TV`;
            } else {
                document.title = 'Horion TV';
            }

            try {
                if (window.parent && window.parent !== window && typeof window.parent.onTvViewChange === 'function') {
                    window.parent.onTvViewChange('details', {
                        id: state.currentShow.id,
                        type: state.currentShow.type,
                        season: state.currentShow.type === 'tv' ? state.currentSeason : null,
                        epNumber: state.currentShow.type === 'tv' && state.currentEpisode ? state.currentEpisode.number : null,
                        title: state.currentShow.title || ''
                    });
                }
            } catch (err) {
                // Ignore parent messaging errors.
            }
        } catch(e) {
             document.getElementById('view-details').innerHTML = '<div style="text-align:center; padding:50px; color:red;">DATA CORRUPTED. RETRY.</div>';
        }
    }

    // 5. RENDERERS
    // ==========================================

    function renderHero(show) {
        const container = document.getElementById('hero-container');
        if(!show) return;
        const heroMeta = [
            show.rating ? `<span style="color:var(--warning-gold);">RATING ${show.rating}</span>` : '',
            show.year ? `<span>${show.year}</span>` : ''
        ].filter(Boolean).join('<span>|</span>');
        
        container.innerHTML = `
            <div class="hero-banner">
                <div class="hero-bg" style="background-image: url('${show.backdrop}')"></div>
                <div class="hero-content">
                    <div style="color:var(--neon-blue); font-family:'JetBrains Mono'; margin-bottom:5px; text-transform: uppercase;">
                       FEATURED ${show.type === 'movie' ? 'MOVIE' : 'TV SHOW'}
                    </div>
                    <h1 class="hero-title">${show.title}</h1>
                    ${heroMeta ? `<div style="display:flex; gap:15px; margin-bottom:15px; font-family:'JetBrains Mono'; font-size:0.9rem;">${heroMeta}</div>` : ''}
                    <p class="hero-desc">${show.summary ? show.summary.substring(0, 200) + '...' : ''}</p>
                    <button onclick="router('details', { id: ${show.id}, type: '${show.type}' })" class="btn-action">WATCH NOW</button>
                </div>
            </div>
        `;
    }

    function renderGrid(shows, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        
        shows.forEach(show => {
            const card = document.createElement('div');
            card.className = 'tv-card';
            card.onclick = () => router('details', { id: show.id, type: show.type });
            const metaParts = [show.year, show.rating ? `RATING ${show.rating}` : '', (show.type || '').toUpperCase()].filter(Boolean);
            
            card.innerHTML = `
                <img src="${show.poster}" loading="lazy">
                <div class="card-overlay">
                    <div class="tv-title">${show.title}</div>
                    <div class="tv-meta">${metaParts.join(' | ')}</div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function renderContinueWatching() {
        const container = document.getElementById('continue-grid');
        const cwList = getContinueWatching();
        
        if (cwList.length === 0) {
            container.innerHTML = `
                <div style="color:var(--text-grey); font-family:'JetBrains Mono'; grid-column: 1 / -1; padding: 40px 0;">
                    Start watching a show or movie to add it to Continue Watching.
                </div>`;
            return;
        }

        container.innerHTML = '';
        cwList.forEach(item => {
            const card = document.createElement('div');
            card.className = 'tv-card';
            card.onclick = () => router('details', { id: item.id, type: item.type, season: item.season, epNumber: item.episodeNumber });
            
            const metaText = item.type === 'movie' ? 'MOVIE' : `S${item.season}:E${item.episodeNumber}`;
            
            card.innerHTML = `
                <img src="${item.poster}" loading="lazy">
                <div class="card-overlay">
                    <div class="tv-title">${item.title}</div>
                    <div class="tv-meta" style="color: var(--neon-blue);">${metaText} | RESUME</div>
                </div>

            container.appendChild(card);
        });
    }

            providerUrl = getProviderUrl(show.imdbId, show.tmdbId, 'movie');

        } else {
            providerUrl = getProviderUrl(show.imdbId, show.tmdbId, 'tv', state.currentSeason, state.currentEpisode.number);

                    </div>

        if (!isMovie) renderEpisodeList();

    function renderEpisodeList() {
        const container = document.getElementById('episodes-scroll');
        const episodes = state.currentShow.episodes[state.currentSeason] || [];
        
        if(episodes.length === 0) {
            container.innerHTML = '<div style="padding:20px; color:grey; text-align:center;">NO DATA AVAILABLE</div>';
            return;
        }

        container.innerHTML = episodes.map((ep, idx) => {
            const isActive = (ep.number === state.currentEpisode?.number);
            return `
                <div class="episode-item ${isActive ? 'active' : ''}" onclick="playEpisode(${state.currentSeason}, ${idx})">
                    <div class="ep-num">${ep.number}</div>
                    <div class="ep-title">${ep.title}</div>
                </div>

        }).join('');

    // ==========================================
    // 6. PLAYER LOGIC
    // ==========================================

    async function changeSeason(season) {
        state.currentSeason = parseInt(season);
        
        if (!state.currentShow.episodes[state.currentSeason]) {
            const container = document.getElementById('episodes-scroll');
            container.innerHTML = '<div style="padding:20px; color:var(--neon-blue); text-align:center; font-family:\'JetBrains Mono\';">LOADING...</div>';
            
            const eps = await ShowService.getSeasonEpisodes(state.currentShow.id, state.currentSeason);
            state.currentShow.episodes[state.currentSeason] = eps;
        }
        renderEpisodeList();

        try {
            if (window.parent && window.parent !== window && typeof window.parent.onTvViewChange === 'function' && state.currentShow) {
                window.parent.onTvViewChange('details', {
                    id: state.currentShow.id,
                    type: state.currentShow.type,
                    season: state.currentSeason,
                    epNumber: state.currentEpisode ? state.currentEpisode.number : null,
                    title: state.currentShow.title || ''
                });
            }
        } catch (err) {
            // Ignore parent messaging errors.
        }
    }

    function playEpisode(season, index) {
        state.currentSeason = season;
        state.currentEpisode = state.currentShow.episodes[season][index];
        saveProgress(); 
        renderDetailsView(); 
        window.scrollTo(0,0);

        try {
            if (window.parent && window.parent !== window && typeof window.parent.onTvViewChange === 'function' && state.currentShow) {
                window.parent.onTvViewChange('details', {
                    id: state.currentShow.id,
                    type: state.currentShow.type,
                    season: state.currentSeason,
                    epNumber: state.currentEpisode ? state.currentEpisode.number : null,
                    title: state.currentShow.title || ''
                });
            }
        } catch (err) {
            // Ignore parent messaging errors.
        }
    }

    function switchServer(server) {
        state.currentServer = server;
        renderDetailsView();
    }

    function getProviderUrl(imdbId, tmdbId, type, season = null, episode = null) {
        const idToUse = tmdbId || imdbId;
        
        if (state.currentServer === 'server1') {
            if (type === 'movie') {
                return `https://vidsrc.cc/v2/embed/movie/${idToUse}`;
            } else {
                return `https://vidsrc.cc/v2/embed/tv/${idToUse}/${season}/${episode}`;
            }
        } else {
            if (type === 'movie') {
                return `https://multiembed.mov/directstream.php?video_id=${imdbId}&tmdb=${tmdbId}`;
            } else {
                return `https://multiembed.mov/directstream.php?video_id=${imdbId}&tmdb=${tmdbId}&s=${season}&e=${episode}`;
            }
        }
    }

    // ========================================== 
    // 7. YOUTUBE NAV LAUNCHER LOGIC
    // ==========================================

    function launchSite(targetUrl) {
    // 1. Open the new window
    const win = window.open('about:blank', '_blank');
    
    if (!win) {
        alert("Popup blocked! Please allow popups for this site.");
        return false;
    }

    // 2. Define the content to inject
    // The <base target="_self"> ensures all clicks stay inside the iframe's context
    const htmlContent = `
        <!DOCTYPE html>
        <html>
        <head>
            <title>Horion TV</title>
            <style>
                body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #   000; }
                iframe { border: none; width: 100%; height: 100%; }
            </style>
        </head>
        <body>
            <iframe src="${targetUrl}" allow="autoplay; encrypted-media; fullscreen"></iframe>
            <script>
            <\/script>
        </body>
        </html>
    `;

    // 3. Write to the new window
    win.document.open();
    win.document.write(htmlContent);
    win.document.close();
    
    return true;
}

function openInlineTvPage(targetUrl, titleText, options) {
    const normalizedUrl = String(targetUrl || '').trim();
    if (!normalizedUrl) return false;

    const existing = document.getElementById('horion-tv-inline-page');
    if (existing) existing.remove();

    const host = document.createElement('section');
    host.id = 'horion-tv-inline-page';
    host.style.position = 'fixed';
    host.style.left = '0';
    host.style.right = '0';
    host.style.bottom = '0';
    host.style.zIndex = '9990';
    host.style.background = '#000';
    host.style.borderTop = '1px solid rgba(0, 112, 255, 0.25)';

    host.innerHTML = `
        <iframe
            id="horion-tv-inline-host-frame"
            src="about:blank"
            allow="autoplay; encrypted-media; fullscreen"
            allowfullscreen
            style="border:none;width:100%;height:100%;background:#000;"
        ></iframe>
    `;

    const applyOffset = function () {
        const nav = document.querySelector('.hud-nav');
        const top = nav ? Math.max(0, Math.round(nav.getBoundingClientRect().bottom)) : 0;
        host.style.top = top + 'px';
    };

    const closeInlineView = function () {
        window.removeEventListener('resize', applyOffset);
        document.removeEventListener('keydown', onKeydown);
        host.remove();
    };

    const onKeydown = function (event) {
        if (event.key === 'Escape') closeInlineView();
    };

    document.body.appendChild(host);
    const hostFrame = document.getElementById('horion-tv-inline-host-frame');
    if (hostFrame && hostFrame.contentWindow && hostFrame.contentWindow.document) {
        const wrapperHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${String(titleText || 'TV Tool')}</title><base target="_self"><style>html,body{margin:0;padding:0;width:100%;height:100%;background:#000;overflow:hidden}iframe{border:none;width:100%;height:100%;background:#000}</style></head><body><iframe src="${normalizedUrl}" allow="autoplay; encrypted-media; fullscreen; clipboard-read; clipboard-write; picture-in-picture; screen-wake-lock" allowfullscreen></iframe></body></html>`;
        hostFrame.contentWindow.document.open();
        hostFrame.contentWindow.document.write(wrapperHtml);
        hostFrame.contentWindow.document.close();
    }

    applyOffset();
    window.addEventListener('resize', applyOffset);
    document.addEventListener('keydown', onKeydown);

    return true;
}

        }
        // Keep Sports inside the inline host that renders through about:blank.
        openInlineTvPage('https://streami.su/', 'Live Sports', { blockNewTabs: true });
    }

    // ==========================================
    // 8. BROWSE / SEARCH LOGIC
    // ==========================================
    const searchInput = document.getElementById('browse-search');
    let debounceTimer;
    
    searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(async () => {
            const query = e.target.value.trim();
            const container = document.getElementById('browse-grid');
            
            // Revert back to top 50 default list if search is empty
            if(!query) {
                renderGrid(state.browseDefault, 'browse-grid');
                return;
            }
            
            container.innerHTML = '<div style="color:var(--neon-blue); font-family:\'JetBrains Mono\'; grid-column: 1/-1;">SCANNING DATABASE...</div>';
            const results = await ShowService.searchShows(query);
            
            if (results.length === 0) {
                 container.innerHTML = '<div style="color:var(--text-grey); font-family:\'JetBrains Mono\'; grid-column: 1/-1;">No results found in database.</div>';
            } else {
                 renderGrid(results, 'browse-grid');
            }
        }, 600);
    });

</script>
