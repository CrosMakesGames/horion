<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horion</title>
    <link rel="icon" type="image/x-icon" href="./favicon.ico" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020408;
            --panel: rgba(0, 0, 0, 0.56);
            --panel-border: rgba(0, 180, 255, 0.2);
            --text: #e8f6ff;
            --muted: #7da8c2;
            --accent: #00b4ff;
            --accent-soft: rgba(0, 180, 255, 0.16);
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            --radius: 14px;
        }

        body[data-mode="games"] {
            --bg: #020504;
            --panel: rgba(6, 12, 8, 0.6);
            --panel-border: rgba(40, 255, 140, 0.18);
            --text: #ecffee;
            --muted: #86b998;
            --accent: #34ff9a;
            --accent-soft: rgba(52, 255, 154, 0.15);
        }

        body[data-mode="tv"] {
            --bg: #03050d;
            --panel: rgba(5, 9, 18, 0.62);
            --panel-border: rgba(0, 170, 255, 0.22);
            --text: #eaf3ff;
            --muted: #88a8ce;
            --accent: #00b2ff;
            --accent-soft: rgba(0, 178, 255, 0.18);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            width: 100%;
            min-height: 100%;
            font-family: Inter, sans-serif;
            color: var(--text);
            background: var(--bg);
            direction: ltr;
        }

        body {
            transition: background 260ms ease;
            overflow-x: hidden;
        }

        .bg-noise,
        .bg-glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        .bg-glow {
            background:
                radial-gradient(circle at 12% 18%, var(--accent-soft), transparent 42%),
                radial-gradient(circle at 84% 14%, rgba(255, 255, 255, 0.08), transparent 38%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 30%);
            transition: background 260ms ease;
            z-index: -2;
        }

        .bg-noise {
            z-index: -1;
            opacity: 0.15;
            background-image: radial-gradient(rgba(255,255,255,0.14) 0.5px, transparent 0.5px);
            background-size: 3px 3px;
        }

        .mode-dock {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 30;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-radius: 999px;
            border: 1px solid var(--panel-border);
            background: rgba(2, 8, 18, 0.7);
            backdrop-filter: blur(10px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.38);
        }

        .mode-chip {
            border: 1px solid transparent;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-family: "JetBrains Mono", monospace;
            font-size: 0.74rem;
            font-weight: 700;
            letter-spacing: 0.11em;
            text-transform: uppercase;
            padding: 8px 14px;
            border-radius: 999px;
            transition: all 190ms ease;
        }

        .mode-chip:hover {
            color: var(--text);
            border-color: var(--panel-border);
            background: rgba(255, 255, 255, 0.06);
        }

        .mode-chip.active {
            color: #021218;
            border-color: transparent;
            background: linear-gradient(135deg, var(--accent), #8ff1ff);
            box-shadow: 0 0 18px rgba(0, 180, 255, 0.36);
        }

        .beta-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background: rgba(1, 8, 16, 0.68);
            backdrop-filter: blur(4px);
        }

        .beta-modal-overlay.active {
            display: flex;
        }

        .beta-modal {
            width: min(700px, 100%);
            border: 1px solid rgba(52, 255, 154, 0.34);
            border-radius: 16px;
            background:
                radial-gradient(circle at 82% 12%, rgba(52, 255, 154, 0.16), transparent 42%),
                radial-gradient(circle at 12% 88%, rgba(0, 178, 255, 0.14), transparent 48%),
                linear-gradient(160deg, rgba(4, 14, 20, 0.98), rgba(10, 22, 16, 0.96));
            box-shadow: 0 30px 56px rgba(0, 0, 0, 0.5);
            padding: 26px 24px;
            color: var(--text);
        }

        .beta-modal h3 {
            margin: 0 0 10px;
            font-size: 1.3rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #dfffe9;
        }

        .beta-modal p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
            font-size: 1rem;
            max-width: 62ch;
        }

        .beta-modal-actions {
            margin-top: 20px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .beta-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            border-radius: 10px;
            padding: 11px 15px;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            border: 1px solid rgba(120, 168, 190, 0.52);
            color: #d9ecfb;
            background: rgba(16, 30, 38, 0.8);
        }

        .beta-link:hover {
            filter: brightness(1.08);
        }

        .beta-dismiss {
            border: 1px solid rgba(52, 255, 154, 0.55);
            background: linear-gradient(135deg, rgba(52, 255, 154, 0.34), rgba(0, 178, 255, 0.34));
            color: #001b11;
            border-radius: 10px;
            padding: 11px 18px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 18px rgba(52, 255, 154, 0.28);
        }

        .beta-dismiss:hover {
            filter: brightness(1.08);
        }

        @media (max-width: 640px) {
            .beta-modal {
                padding: 20px 18px;
            }

            .beta-modal h3 {
                font-size: 1.1rem;
            }

            .beta-modal-actions {
                flex-direction: column;
            }

            .beta-link,
            .beta-dismiss {
                width: 100%;
            }
        }

        .app-shell {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 0;
        }

        .surface {
            border: 0;
            border-radius: 0;
            background: transparent;
            box-shadow: none;
            overflow: hidden;
            min-height: 100vh;
        }

        .switch-track {
            position: relative;
            width: 200%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            transform: translateX(0);
        }

        body[data-mode="tv"] .switch-track { transform: translateX(-50%); }

        .switch-track.animate {
            transition: transform 220ms cubic-bezier(.22,1,.36,1);
        }

        .switch-track.settled {
            width: 100%;
            display: block;
            transform: translateX(0) !important;
            transition: none !important;
        }

        .switch-track.settled .mode-pane {
            display: none;
        }

        .switch-track.settled .mode-pane.active {
            display: block;
        }

        .mode-pane { min-height: 100vh; padding: 0; }

        .embed-wrap {
            width: 100%;
            height: 100vh;
            border: 0;
            border-radius: 0;
            overflow: hidden;
            background: transparent;
        }

        .app-frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #000;
        }

        @media (max-width: 900px) {
            .mode-dock {
                left: 50%;
                right: auto;
                transform: translateX(-50%);
                bottom: 14px;
            }

            .mode-pane { padding: 0; }
            .embed-wrap { height: 100vh; }
            .mode-pane { min-height: 100vh; padding: 0; }
            .app-shell { padding: 0; }
        }
    </style>
</head>
<body data-mode="games">
    <div class="bg-glow" aria-hidden="true"></div>
    <div class="bg-noise" aria-hidden="true"></div>

    <main class="app-shell">
        <section class="surface">
            <div class="switch-track" id="switch-track">
                <section class="mode-pane active" aria-label="Games mode" data-mode-pane="games">
                    <div class="embed-wrap">
                        <iframe id="games-frame" class="app-frame" title="Horion Games"></iframe>
                    </div>
                </section>

                <section class="mode-pane" aria-label="TV mode" data-mode-pane="tv">
                    <div class="embed-wrap">
                        <iframe id="tv-frame" class="app-frame" title="Horion TV"></iframe>
                    </div>
                </section>
            </div>
        </section>
    </main>

    <div class="mode-dock" role="group" aria-label="Mode switch">
        <button class="mode-chip active" id="mode-games" data-mode-target="games" type="button" aria-pressed="true">Games</button>
        <button class="mode-chip" id="mode-tv" data-mode-target="tv" type="button" aria-pressed="false">TV</button>
    </div>

                <textarea id="games-app-template" hidden>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600&family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">
    <style>
        /* --- ROOT VARIABLES --- */
:root {
    --hacker-blue: #0070FF;
    --neon-blue: #00E5FF;
    --bg-dark: #000000;
    --text-grey: #445566;
    --warning-gold: #FFC107;
    --heart-red: #FF0050; /* Deeper, TikTok-style red */
}

/* --- BODY --- */
body {
    margin: 0;
    background-color: var(--bg-dark);
    font-family: 'Inter', sans-serif;
    color: white;
    overflow-x: hidden;
    overflow-y: scroll;
    scroll-behavior: smooth;
}

/* --- BOOTUP OVERLAY --- */
#boot-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #020205;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.5s ease, visibility 0.5s;
}

.boot-text {
    font-family: 'JetBrains Mono', monospace;
    color: var(--neon-blue);
    letter-spacing: 4px;
    margin-bottom: 20px;
    font-size: 0.9rem;
    text-transform: uppercase;
    animation: pulseText 2s infinite;
}

@keyframes pulseText {
    0% { opacity: 0.7; }
    50% { opacity: 1; text-shadow: 0 0 10px var(--neon-blue); }
    100% { opacity: 0.7; }
}

.progress-container {
    width: 300px;
    height: 3px;
    background: rgba(0, 112, 255, 0.15);
    position: relative;
    border-radius: 2px;
    overflow: hidden;
}

.progress-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 0%;
    height: 100%;
    background: var(--neon-blue);
    box-shadow: 0 0 20px var(--neon-blue);
    transition: width 0.1s linear;
}

/* --- NAVBAR --- */
.hud-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
    background: rgba(0, 5, 15, 0.8);
    border-bottom: 1px solid rgba(0, 112, 255, 0.15);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(5px);
}

.nav-logo {
    font-size: 3rem;
    font-weight: 100;
    letter-spacing: 12px;
    text-decoration: none;
    color: white;
    transition: 0.4s ease;
}

.nav-logo:hover { color: var(--neon-blue); cursor: pointer; }

.gnmath-fallback-note {
    margin-left: 10px;
    color: #58c8ff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1.3;
    text-transform: none;
    max-width: 260px;
}

.gnmath-fallback-note.hidden {
    display: none;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 10px;
}

.taskbar-pins {
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav-item.pinned-app-btn {
    color: #07c8d9 !important;
    font-weight: 900 !important;
    text-shadow: 0 0 8px rgba(154, 247, 255, 0.55);
}

.nav-item {
    text-decoration: none;
    color: white;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 4px;
    transition: 0.3s;
    padding: 10px 20px;
    display: inline-block;
}

.nav-item.more {
    font-size: 11px;
    color: var(--text-grey);
    letter-spacing: 2px;
}

.nav-item:hover { color: var(--neon-blue); cursor: pointer;}
.nav-item.active { color: var(--hacker-blue); border-bottom: 1px solid var(--hacker-blue); }
.nav-item.more.active { color: var(--hacker-blue); border-bottom: 1px solid var(--hacker-blue); }
.nav-item.hidden { display: none; }

/* --- CONTENT CONTAINER --- */
.content-container {
    max-width: 1200px;
    margin: 40px auto;
    padding: 60px 40px;
    position: relative;
    z-index: 1;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(0, 112, 255, 0.1);
    border-radius: 4px;
    backdrop-filter: blur(2px);
    min-height: 60vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    box-sizing: border-box;
}

/* --- HOMEPAGE SPECIFICS --- */
.home-title {
    font-size: 4rem;
    font-weight: 100;
    letter-spacing: 15px;
    color: var(--neon-blue);
    margin: 0;
    text-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
}

.home-subtitle {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9rem;
    color: #334455;
    text-decoration: none;
    margin-top: 10px;
    margin-bottom: 30px;
    letter-spacing: 2px;
    transition: 0.3s;
    cursor: pointer;
}

.home-subtitle:hover {
    color: var(--hacker-blue);
    text-decoration: underline;
    text-shadow: 0 0 5px var(--hacker-blue);
}

/* --- DISCLAIMER BOX --- */
.disclaimer-box {
    background: rgba(255, 193, 7, 0.05);
    border: 1px solid rgba(255, 193, 7, 0.4);
    padding: 25px;
    margin-bottom: 40px;
    border-radius: 6px;
    max-width: 650px;
    width: 90%;
    box-shadow: 0 0 20px rgba(255, 193, 7, 0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.disclaimer-text {
    color: var(--warning-gold);
    font-size: 1.1rem;
    font-weight: 600;
    margin: 0;
    line-height: 1.5;
    text-shadow: 0 0 10px rgba(255, 193, 7, 0.3);
}

.doc-btn {
    display: inline-block;
    padding: 10px 25px;
    background: rgba(255, 193, 7, 0.1);
    border: 1px solid var(--warning-gold);
    color: var(--warning-gold);
    font-family: 'JetBrains Mono', monospace;
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 1px;
    transition: 0.3s;
    border-radius: 2px;
}

.doc-btn:hover {
    background: var(--warning-gold);
    color: black;
    box-shadow: 0 0 20px rgba(255, 193, 7, 0.4);
    transform: translateY(-2px);
}

/* --- BUTTONS --- */
.button-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 50px;
}

.btn-row {
    display: flex;
    gap: 15px;
    justify-content: center;
}

.action-btn {
    flex: 1;
    padding: 15px 0;
    background: rgba(0, 112, 255, 0.1);
    border: 1px solid var(--hacker-blue);
    color: white;
    font-family: 'JetBrains Mono', monospace;
    text-decoration: none;
    letter-spacing: 2px;
    font-size: 0.9rem;
    transition: 0.3s;
    text-align: center;
}

.action-btn:hover {
    background: var(--hacker-blue);
    color: white;
    box-shadow: 0 0 15px var(--hacker-blue);
    cursor: pointer;
}

.secondary-btn {
    width: 100%;
    padding: 10px 0;
    background: transparent;
    border: 1px solid #334455;
    color: #667788;
    font-family: 'JetBrains Mono', monospace;
    text-decoration: none;
    letter-spacing: 2px;
    font-size: 0.8rem;
    transition: 0.3s;
    text-align: center;
    cursor: pointer;
}

.secondary-btn:hover {
    border-color: var(--hacker-blue);
    color: var(--neon-blue);
}

/* --- DESCRIPTION & RECENT CHANGES --- */
.description-area {
    font-size: 1rem;
    line-height: 1.6;
    color: #cccccc;
    max-width: 600px;
    margin-bottom: 50px;
    font-weight: 300;
}

.recent-changes-container {
    width: 100%;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 20px;
    text-align: left;
}

.recent-label {
    color: var(--neon-blue);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    margin-bottom: 10px;
}

.change-log {
    color: #8899aa;
    font-size: 0.9rem;
    font-weight: 300;
}

/* --- SEARCH BAR --- */
#searchBar {
    width: 100%;
    box-sizing: border-box;
    background: rgba(0, 5, 15, 0.8);
    border: 1px solid var(--hacker-blue);
    padding: 20px;
    margin-bottom: 30px;
    color: white;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 2px;
    outline: none;
    border-radius: 4px;
    font-size: 1rem;
}

#searchBar:focus {
    box-shadow: 0 0 15px rgba(0, 112, 255, 0.2);
    border-color: var(--neon-blue);
}

/* --- GAME GRID --- */
.game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 20px;
}

.game-card {
    position: relative;
    aspect-ratio: 1 / 1;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(0, 112, 255, 0.15);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}

.game-card:hover {
    transform: translateY(-5px);
    border-color: var(--neon-blue);
    box-shadow: 0 0 15px rgba(0, 229, 255, 0.15);
}

.game-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: filter 0.3s ease, transform 0.5s ease;
}

.card-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    transition: opacity 0.3s ease;
    padding: 10px;
    box-sizing: border-box;
}

.game-title {
    color: var(--neon-blue);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    text-align: center;
    font-size: 1rem;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.game-card:hover img {
    filter: brightness(0.3) blur(2px);
    transform: scale(1.1);
    cursor: pointer;
}

.game-card:hover .card-overlay {
    opacity: 1;
}

/* --- FAV HEART (FEATURED) --- */
.fav-star-featured {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 20;
    width: 32px;       /* Fixed size for SVG */
    height: 32px;
    opacity: 0;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s, filter 0.2s;
    filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
}

.special-web-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 18;
    display: block;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 1.8rem;
    font-weight: 900;
    line-height: 0.85;
    transform: scaleX(1.24);
    transform-origin: top left;
    -webkit-text-stroke: 1px rgba(0, 0, 0, 0.45);
    text-shadow: 0 0 1px rgba(0, 0, 0, 0.4);
    pointer-events: none;
}

/* SVG Styling inside the container */
.fav-star-featured path {
    fill: rgba(0, 0, 0, 0.3); /* Semi-transparent dark fill by default */
    stroke: white;            /* White outline to be visible on images */
    stroke-width: 2px;
    transition: fill 0.2s, stroke 0.2s;
}

.game-card:hover .fav-star-featured {
    opacity: 1;
}

.fav-star-featured:hover {
    transform: scale(1.2);
}

/* ACTIVE (LIKED) STATE */
.fav-star-featured.active {
    opacity: 1;
    transform: scale(1.1);
    /* The glow effect around the whole shape */
    filter: drop-shadow(0 0 10px var(--heart-red)); 
}

.fav-star-featured.active path {
    fill: var(--heart-red);   /* The Red Fill */
    stroke: black;            /* The Black Outline requested */
    stroke-width: 1.5px;
}

/* --- MORE PAGE --- */
.section-header {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 8px;
    color: white;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--hacker-blue);
    padding-bottom: 10px;
    width: 100%;
    text-align: center;
}

.info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    max-width: 600px;
    margin-bottom: 40px;
}

.info-card {
    background: rgba(0, 112, 255, 0.05);
    border: 1px solid rgba(0, 112, 255, 0.2);
    padding: 20px;
    text-align: left;
    transition: 0.3s;
}

.info-card:hover {
    border-color: var(--neon-blue);
    box-shadow: 0 0 10px rgba(0, 229, 255, 0.1);
}

.card-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-grey);
    display: block;
    margin-bottom: 5px;
}

.card-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.2rem;
    color: var(--neon-blue);
}

<script type="text/javascript">
    // ==========================================

    const OFFICIAL_GITHUB_URL = 'https://crosmakesgames.github.io/horion/';
    const PORTAL_DOC_URL = 'https://docs.google.com/document/d/e/2PACX-1vS7zNM-V5HT60eoCjMcBXUL9oeXFQRWDeCW2wxKtCp5zlxjM2VhqhsipZLXXZ51q-HWi48ti90deumm/pub';
    const LAUNCHER_URL = 'https://example.com/launcher';
    let launchedFromAboutBlankBridge = false;

    function getRuntimeHostHref() {
        const candidates = [];

        try {
            if (window.top && window.top.location && window.top.location.href) {
                candidates.push(window.top.location.href);
            }
        } catch (err) {
            // Ignore cross-frame access failures.
        }

        try {
            if (window.parent && window.parent.location && window.parent.location.href) {
                candidates.push(window.parent.location.href);
            }
        } catch (err) {
            // Ignore cross-frame access failures.
        }

        if (document.referrer) {
            candidates.push(document.referrer);
        }

        if (window.location && window.location.href) {
            candidates.push(window.location.href);
        }

        for (const href of candidates) {
            if (typeof href === 'string' && href.trim()) {
                return href.trim();
            }
        }

        return '';
    }

    function isAboutLaunchHref(href) {
        if (launchedFromAboutBlankBridge) {
            return true;
        }

        const value = String(href || '').trim().toLowerCase();
        return value.startsWith('about:');
    }

    function applyRuntimeLaunchNotice() {
        const warningText = document.getElementById('runtime-warning-text');
        const warningLink = document.getElementById('runtime-warning-link');
        const serverValue = document.getElementById('selected-server-value');
        if (!warningText || !warningLink || !serverValue) {
            return;
        }

        const hostHref = getRuntimeHostHref();
        const launchedFromAbout = isAboutLaunchHref(hostHref);

        warningText.textContent = 'Visit the Google Doc to see a updated portal link to forever stay unblocked!';
        warningLink.textContent = 'Google Doc';
        warningLink.href = PORTAL_DOC_URL;

        if (launchedFromAbout) {
            serverValue.textContent = 'LAUNCHER';
        } else {
            serverValue.textContent = 'GITHUB';
        }
    }

    // Allow an about:blank launcher wrapper to forward browser-back events
    // and launch-context state to this page.
    window.addEventListener('message', function (event) {
        if (!event || !event.data || !event.data.type) {
            return;
        }

        if (event.data.type === 'HORION_LAUNCH_CONTEXT') {
            launchedFromAboutBlankBridge = Boolean(event.data.aboutBlank);
            applyRuntimeLaunchNotice();
            return;
        }

        if (event.data.type === 'HORION_BROWSER_BACK') {
            window.history.back();
        }

            id: 'gnmath',
            name: 'GN-Math',
            description: 'GN-Math has lots of games, especially ports of real games.',
            image: 'https://lh3.googleusercontent.com/Mxl8996vzcWWRU5RyKdTDA76GEPj9jQpuYc02nPgtwKgdqpWidM5YVqu8DHBd-D1sZ3sP1AOYB-DlNhMEpaLJxQcTQ=s128-rj-sc0x00ffffff',

            launch: () => openTestingExtension()
        }

    const TASKBAR_TARGET_KEY = 'horion_taskbar_gnmath_target';
    const defaultTaskbarTarget = 'gnmath';
    let taskbarTarget = localStorage.getItem(TASKBAR_TARGET_KEY) || defaultTaskbarTarget;

    // ==========================================
    // 2. FAVORITES LOGIC (LOCAL STORAGE)
    // ==========================================
    let favorites = JSON.parse(localStorage.getItem('horion_favorites')) || [];

    function saveFavorites() {
        localStorage.setItem('horion_favorites', JSON.stringify(favorites));
        checkFavoritesVisibility();
        updateFavoritesView(); // Refresh the fav tab if open
    }

    function toggleFavorite(id, type, event) {
        if(event) event.stopPropagation(); // Stop opening game
        
        // Check if exists
        const index = favorites.findIndex(f => f.id === id);
        if(index > -1) {
            // Remove
            favorites.splice(index, 1);
        } else {
            // Add
            favorites.push({ id: id, type: type });
        }
        saveFavorites();
        
        // Re-render current views to update star status
        // We only re-render the view we are likely interacting with to save performance
        // But for consistency we can just re-check stars in DOM
        updateStarVisuals(id);
    }

    function isFavorite(id) {
        return favorites.some(f => f.id === id);
    }

    function updateStarVisuals(id) {
        // Find all stars with this data-id and toggle class
        const stars = document.querySelectorAll(`.fav-star-featured[data-id="${id}"], .fav-star-db[data-id="${id}"]`);
        const isFav = isFavorite(id);
        stars.forEach(star => {
            if (isFav) star.classList.add('active');
            else star.classList.remove('active');
        });
    }

    function checkFavoritesVisibility() {
        const btn = document.getElementById('btn-favorites');
        if(favorites.length > 0) {
            btn.classList.remove('hidden');
        } else {
            btn.classList.add('hidden');
            // If currently on favorites page and it becomes empty, switch to featured
            const favView = document.getElementById('view-favorites');
            if(favView.classList.contains('active')) {
               // Optional: kick user out? Or just show empty state. 
               // For now, let's leave them there so they can see it's empty.
            }
        }
    }

    function saveTaskbarTarget() {
        if (taskbarTarget) {
            localStorage.setItem(TASKBAR_TARGET_KEY, taskbarTarget);
        } else {
            localStorage.removeItem(TASKBAR_TARGET_KEY);
        }
        renderTaskbarPins();
        updateExtensionPinButtons();
    }

    function getTaskbarTargetExtension() {
        if (!taskbarTarget) return null;
        const extension = extensions.find(ext => ext.id === taskbarTarget);
        return extension || null;
    }

    function setTaskbarTarget(extensionId) {
        if (!extensions.some(ext => ext.id === extensionId)) return;
        taskbarTarget = taskbarTarget === extensionId ? null : extensionId;
        saveTaskbarTarget();
    }

    function renderTaskbarPins() {
        const pinContainer = document.getElementById('taskbar-pins');
        if (!pinContainer) return;

        pinContainer.innerHTML = '';

        const extension = getTaskbarTargetExtension();
        if (!extension) return;

        const btn = document.createElement('span');
        btn.id = 'btn-gnmath';
        btn.className = 'nav-item pinned-app-btn';
        btn.innerText = 'GN-MATH';
        btn.onclick = () => extension.launch();
        pinContainer.appendChild(btn);
    }

    function setGamesTaskbarHighlight(buttonId) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const targetBtn = document.getElementById(buttonId);
        if (targetBtn) targetBtn.classList.add('active');
    }

    function generateExtensionsView() {
        const container = document.getElementById('extensions-grid');
        if (!container) return;
        container.innerHTML = '';

        extensions.forEach(extension => {
            const card = document.createElement('div');
            card.className = 'extension-banner';

            const image = document.createElement('img');
            image.className = 'extension-banner-image';
            image.src = extension.image;
            image.alt = extension.name;
            image.onerror = function() {
                this.src = 'https://placehold.co/1200x500/000000/0070FF?text=No+Image';
            };

            const content = document.createElement('div');
            content.className = 'extension-banner-content';

            const title = document.createElement('h3');
            title.className = 'extension-banner-title';
            title.innerText = extension.name;

            const description = document.createElement('p');
            description.className = 'extension-banner-desc';
            description.innerText = extension.description;

            const actions = document.createElement('div');
            actions.className = 'extension-banner-actions';

            const launchButton = document.createElement('button');
            launchButton.className = 'extension-action-btn';
            launchButton.innerText = 'LAUNCH';
            launchButton.onclick = () => extension.launch();

            const pinButton = document.createElement('button');
            pinButton.className = 'extension-action-btn secondary';
            pinButton.dataset.pinId = extension.id;
            pinButton.onclick = () => setTaskbarTarget(extension.id);

            actions.appendChild(launchButton);
            actions.appendChild(pinButton);
            content.appendChild(title);
            content.appendChild(description);
            content.appendChild(actions);
            card.appendChild(image);
            card.appendChild(content);
            container.appendChild(card);
        });

        updateExtensionPinButtons();
    }

    function updateExtensionPinButtons() {
        document.querySelectorAll('[data-pin-id]').forEach(button => {
            const id = button.dataset.pinId;
            button.innerText = taskbarTarget === id ? 'PINNED TO TASKBAR' : 'PIN TO TASKBAR';
        });
    }
    
    // ==========================================
    // 3. NAVIGATION & TAB LOGIC
    // ==========================================
    let isGnMathViewActive = false;
    let gnMathFallbackActive = false;

    function updateGNMathFallbackNotice() {
        const note = document.getElementById('gnmath-fallback-note');
        if (!note) return;

        const shouldShow = isGnMathViewActive && gnMathFallbackActive;
        note.classList.toggle('hidden', !shouldShow);
        note.setAttribute('aria-hidden', shouldShow ? 'false' : 'true');
    }

    function switchView(viewName, options = {}) {
        const shouldNotifyParent = options.notifyParent !== false;
        const shouldUpdateUrl = options.updateUrl === true;
        const shouldReplaceUrl = options.replaceUrl === true;
        const inlinePage = document.getElementById('horion-inline-page');
        if (inlinePage) inlinePage.remove();

        isGnMathViewActive = viewName === 'gnmath';
        updateGNMathFallbackNotice();

        const views = ['home', 'favorites', 'featured', 'featured-game', 'database', 'extensions', 'more'];
        views.forEach(v => {
            document.getElementById(`view-${v}`).classList.remove('active');
        });
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`view-${viewName}`).classList.add('active');
        const activeBtn = document.getElementById(`btn-${viewName}`);
        if(activeBtn) activeBtn.classList.add('active');
        window.scrollTo(0,0);
        
        if(viewName === 'favorites') updateFavoritesView();

        const viewTitleMap = {
            home: 'Horion',
            featured: 'Horion - Featured',
            'featured-game': currentFeaturedGame ? `Horion - ${currentFeaturedGame.displayname}` : 'Horion - Featured Game',
            database: 'Horion - Database',
            favorites: 'Horion - Favorites',
            extensions: 'Horion - Extensions',
            more: 'Horion - More'
        };
        document.title = viewTitleMap[viewName] || 'Horion';

        if (shouldNotifyParent) {
            try {
                const featuredPageId = viewName === 'featured-game' && currentFeaturedGame
                    ? getFeaturedRouteId(currentFeaturedGame.displayname)
                    : null;

                if (window.parent && window.parent !== window && typeof window.parent.onGamesViewChange === 'function') {
                    window.parent.onGamesViewChange(viewName === 'featured-game' ? 'featured' : viewName, featuredPageId);
                }

                if (window.parent && window.parent !== window && typeof window.parent.onGamesFeaturedPageChange === 'function') {
                    window.parent.onGamesFeaturedPageChange(featuredPageId);
                }
            } catch (err) {
                // Ignore parent messaging errors.
            }
        }

        if (shouldUpdateUrl) {
            try {
                pushViewUrl(viewName, shouldReplaceUrl);
            } catch (err) {
                // Ignore local URL sync failures in iframe contexts.
            }
        }
    }

    // ==========================================
    // 4. GENERATION LOGIC
    // ==========================================
    // Global state to track sort order
    let isAscending = true; 
    let currentFeaturedGame = null;

    function getFeaturedRouteId(displayName) {
        return String(displayName || '').trim().replace(/\s+/g, '_').toLowerCase();
    }

    function findFeaturedGameByRouteId(routeId) {
        const safeId = String(routeId || '').trim().toLowerCase();
        if (!safeId) return null;
        return featuredGames.find(game => getFeaturedRouteId(game.displayname).toLowerCase() === safeId) || null;
    }

    function resolveFeaturedIframeUrl(game) {
        if (!game || !game.filename) return 'about:blank';

        const rawFilename = String(game.filename).trim();
        if (!rawFilename) return 'about:blank';

        if (game.type === 'special') {
            if (/^https?:\/\//i.test(rawFilename)) {
                return rawFilename;
            }

            const baseCandidates = [];
            try {
                if (window.parent && window.parent !== window && window.parent.location && window.parent.location.href) {
                    baseCandidates.push(window.parent.location.href);
                }
            } catch (err) {
                // Ignore cross-frame location issues.
            }
            baseCandidates.push(document.referrer || '');
            baseCandidates.push(window.location.href || '');

            for (const base of baseCandidates) {
                if (!base || /^about:/i.test(base)) continue;
                try {
                    return new URL(rawFilename, base).href;
                } catch (err) {
                    // Try the next candidate.
                }
            }

            return rawFilename;
        }

        return `https://cdn.jsdelivr.net/gh/bubbls/ugs-singlefile/UGS-Files/${encodeURIComponent(rawFilename)}.html`;
    }

    function loadFeaturedGameIntoFrame(game) {
        const frameEl = document.getElementById('featured-game-frame');
        if (!frameEl || !game) return;

        frameEl.removeAttribute('srcdoc');
        frameEl.src = resolveFeaturedIframeUrl(game);
        updateFeaturedFrameScrollMode();
    }

    function isFeaturedFrameFullscreen(frameEl) {
        return document.fullscreenElement === frameEl || document.webkitFullscreenElement === frameEl || document.msFullscreenElement === frameEl;
    }

    function updateFeaturedFrameScrollMode() {
        const frameEl = document.getElementById('featured-game-frame');
        if (!frameEl) return;

        const allowScroll = isFeaturedFrameFullscreen(frameEl);
        frameEl.setAttribute('scrolling', allowScroll ? 'yes' : 'no');
        frameEl.style.overflow = allowScroll ? 'auto' : 'hidden';

        try {
            const doc = frameEl.contentDocument;
            if (!doc || !doc.documentElement || !doc.body) return;

            const overflowValue = allowScroll ? 'auto' : 'hidden';
            const overscrollValue = allowScroll ? 'auto' : 'none';
            doc.documentElement.style.setProperty('overflow', overflowValue, 'important');
            doc.body.style.setProperty('overflow', overflowValue, 'important');
            doc.documentElement.style.setProperty('overscroll-behavior', overscrollValue, 'important');
            doc.body.style.setProperty('overscroll-behavior', overscrollValue, 'important');
        } catch (err) {
            // Cross-origin iframes cannot be styled directly.
        }
    }

    function pushFeaturedGameUrl(game, shouldReplace) {
        const url = new URL(window.location.href);
        url.searchParams.set('type', 'games');
        url.searchParams.set('page', getFeaturedRouteId(game.displayname));
        url.searchParams.delete('view');
        url.searchParams.delete('id');

        const statePayload = {
            type: 'games',
            page: getFeaturedRouteId(game.displayname)
        };

        if (shouldReplace) {
            history.replaceState(statePayload, '', url);
        } else {
            history.pushState(statePayload, '', url);
        }
    }

    function pushViewUrl(viewName, shouldReplace) {
        const url = new URL(window.location.href);
        const pageValue = viewName === 'featured-game' && currentFeaturedGame
            ? getFeaturedRouteId(currentFeaturedGame.displayname)
            : viewName;

        url.searchParams.set('type', 'games');
        url.searchParams.set('page', pageValue);
        url.searchParams.delete('view');
        url.searchParams.delete('id');

        const statePayload = { type: 'games', page: pageValue };
        if (shouldReplace) {
            history.replaceState(statePayload, '', url);
        } else {
            history.pushState(statePayload, '', url);
        }
    }

    function getRecommendedFeaturedGames(currentGame, count) {
        const targetCount = Number.isFinite(count) ? Math.max(0, count) : 0;
        if (!currentGame || targetCount === 0) return [];

        const recommendedRaw = currentGame.recommended
            || currentGame.recomended
            || currentGame.reccomended
            || currentGame.reccomendedd;

        const recommendedList = Array.isArray(recommendedRaw)
            ? recommendedRaw
            : (typeof recommendedRaw === 'string' && recommendedRaw.trim()
                ? recommendedRaw.split(',').map(item => item.trim()).filter(Boolean)
                : []);

        const normalize = (value) => String(value || '').trim().toLowerCase();

        const byDisplayName = new Map();
        const byRouteId = new Map();
        const byFilename = new Map();

        featuredGames.forEach((game) => {
            if (!game) return;
            byDisplayName.set(normalize(game.displayname), game);
            byRouteId.set(normalize(getFeaturedRouteId(game.displayname)), game);
            byFilename.set(normalize(game.filename), game);
        });

        const selected = [];
        const seen = new Set();
        const addIfValid = (game) => {
            if (!game) return;
            if (game.filename === currentGame.filename) return;
            const key = normalize(game.filename) || normalize(game.displayname);
            if (!key || seen.has(key)) return;
            seen.add(key);
            selected.push(game);
        };

        recommendedList.forEach((entry) => {
            const key = normalize(entry);
            if (!key) return;

            const match = byDisplayName.get(key)
                || byRouteId.get(key)
                || byFilename.get(key)
                || byFilename.get(`${key}.html`)
                || byFilename.get(key.replace(/\.html$/i, ''));

            addIfValid(match);
        });

        if (selected.length < targetCount) {
            featuredGames.forEach((game) => addIfValid(game));
        }

        return selected.slice(0, targetCount);
    }

    function renderRecommendedFeaturedGames(currentGame) {
        const container = document.getElementById('featured-recommended-grid');
        if (!container) return;

        container.innerHTML = '';

            container.appendChild(card);

    function openFeaturedGamePage(game, options = {}) {
        if (!game) return;

        currentFeaturedGame = game;
        const featuredPageId = getFeaturedRouteId(game.displayname);

        const shouldUpdateUrl = options.updateUrl !== false;
        const shouldReplaceUrl = options.replaceUrl === true;

        const titleEl = document.getElementById('featured-game-title');
        const descEl = document.getElementById('featured-game-desc');

        if (titleEl) titleEl.innerText = game.displayname;
        if (descEl) descEl.innerText = game.desc || game.description || '';
        loadFeaturedGameIntoFrame(game);

        renderRecommendedFeaturedGames(game);
        switchView('featured-game', { updateUrl: false });
        document.title = `Horion - ${game.displayname}`;

        if (shouldUpdateUrl) {
            pushFeaturedGameUrl(game, shouldReplaceUrl);
        }
    }

    function openFeaturedGameByRouteId(routeId, options = {}) {
        const game = findFeaturedGameByRouteId(routeId);
        if (!game) return false;
        openFeaturedGamePage(game, options);
        return true;
    }

    window.openFeaturedGameByRouteId = openFeaturedGameByRouteId;

    function routeFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const type = String(params.get('type') || '').trim().toLowerCase();
        const pageParam = String(params.get('page') || '').trim();

        // Backward compatibility with old query format.
        const legacyView = String(params.get('view') || '').trim();
        const legacyId = String(params.get('id') || '').trim();

        if (type === 'games' && pageParam) {
            const page = pageParam.toLowerCase();
            const validViews = new Set(['home', 'favorites', 'featured', 'database', 'extensions', 'more']);

            if (validViews.has(page)) {
                switchView(page, { notifyParent: false, updateUrl: false });
                return;
            }

            const game = findFeaturedGameByRouteId(pageParam);
            if (game) {
                openFeaturedGamePage(game, { updateUrl: false });
                return;
            }

            switchView('featured', { notifyParent: false, updateUrl: false });
            return;
        }

        if (legacyView.toLowerCase() === 'featured-game') {
            const routeId = legacyId;
            const game = findFeaturedGameByRouteId(routeId);
            if (game) {
                openFeaturedGamePage(game, { updateUrl: false });
                return;
            }
            switchView('featured', { notifyParent: false, updateUrl: false });
            return;
        }

        const validViews = new Set(['home', 'favorites', 'featured', 'database', 'extensions', 'more']);
        const fallbackView = legacyView.toLowerCase();
        if (validViews.has(fallbackView)) {
            switchView(fallbackView, { notifyParent: false, updateUrl: false });
        } else {
            switchView('home', { notifyParent: false, updateUrl: false });
        }
    }

        isAscending = !isAscending; // Flip the state

    function getFeaturedRowColumns() {
        if (window.innerWidth <= 620) return 2;
        if (window.innerWidth <= 920) return 4;

        return 7;
    }

    function renderFeaturedRows(container, cards) {
        const columns = getFeaturedRowColumns();
        container.innerHTML = '';

        for (let i = 0; i < cards.length; i += columns) {
            const row = document.createElement('div');
            row.className = 'featured-row';

            cards.slice(i, i + columns).forEach(card => row.appendChild(card));
            container.appendChild(row);

        const sortedGames = [...featuredGames].sort((a, b) => {
            return isAscending

    function buildProxiedAboutBlankHtml(html, baseUrl) {

function launchSite(targetUrl, pageTitle, options) {
    const normalizedUrl = String(targetUrl || '').trim();
    if (!normalizedUrl) return false;
    const opts = options || {};
    const blockNewTabs = Boolean(opts.blockNewTabs);
    const safeTitle = String(pageTitle || 'Horion Game')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');

    const win = window.open('about:blank', '_blank');
    if (!win) {
        alert('Pop-up blocked! Please allow popups for this site.');
        return false;
    }

    try {
        win.opener = null;
    } catch (err) {
        // Some browsers may not allow updating opener.
    }

    const renderIframeWrapper = function (urlValue) {
        const safeUrl = String(urlValue || '')
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;');
        const sandboxAttr = blockNewTabs
            ? ' sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-pointer-lock allow-presentation"'
            : '';
        win.document.open();
        win.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>' + safeTitle + '</title><style>html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000}iframe{border:0;width:100%;height:100%;display:block;background:#000}</style></head><body><iframe src="' + safeUrl + '"' + sandboxAttr + ' allow="autoplay; fullscreen; xr-spatial-tracking; encrypted-media; clipboard-read; clipboard-write; display-capture; gamepad; picture-in-picture; screen-wake-lock" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe></body></html>');
        win.document.close();
    };

    if (blockNewTabs) {
        const renderProxiedPage = function (urlValue) {
            const nextUrl = String(urlValue || '').trim();
            if (!nextUrl) return;

            fetch(nextUrl)
                .then((response) => {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.text();
                })
                .then((htmlText) => {
                    const proxiedHtml = buildProxiedAboutBlankHtml(htmlText, nextUrl);
                    win.__horionNavigate = renderProxiedPage;
                    win.document.open();
                    win.document.write(proxiedHtml);
                    win.document.close();
                })
                .catch(() => {
                    renderIframeWrapper(nextUrl);
                });
        };

        renderProxiedPage(normalizedUrl);
    } else {
        renderIframeWrapper(normalizedUrl);
    }
    
    return true;
}

function runFetchWithTimeout(url, options, timeoutMs) {
    const safeTimeout = Number(timeoutMs) > 0 ? Number(timeoutMs) : 3500;
    const controller = typeof AbortController === 'function' ? new AbortController() : null;

    return new Promise((resolve, reject) => {
        const timer = setTimeout(() => {
            if (controller) controller.abort();
            reject(new Error('timeout'));
        }, safeTimeout);

        fetch(url, {
            ...(options || {}),
            signal: controller ? controller.signal : undefined
        })
            .then((response) => {
                clearTimeout(timer);
                resolve(response);
            })
            .catch((error) => {
                clearTimeout(timer);
                reject(error);
            });
    });
}

async function probeGNMathPrimary(targetUrl, timeoutMs) {
    const safeUrl = String(targetUrl || '').trim();
    if (!safeUrl) return false;

    try {
        const response = await runFetchWithTimeout(safeUrl, {
            method: 'GET',
            cache: 'no-store',
            mode: 'cors'
        }, timeoutMs);

        const bodyText = await response.text();
        const lowerBody = String(bodyText || '').toLowerCase();
        if (lowerBody.includes('cannot load games error')) {
            return false;
        }

        return true;
    } catch (error) {
        return false;
    }
}

function probeUrlReachable(targetUrl, timeoutMs) {
    const safeUrl = String(targetUrl || '').trim();
    const safeTimeout = Number(timeoutMs) > 0 ? Number(timeoutMs) : 3500;
    if (!safeUrl) return Promise.resolve(false);

    return new Promise((resolve) => {
        let didResolve = false;
        const finish = (value) => {
            if (didResolve) return;
            didResolve = true;
            resolve(Boolean(value));
        };

        const controller = typeof AbortController === 'function' ? new AbortController() : null;
        const timer = setTimeout(() => {
            if (controller) controller.abort();
            finish(false);
        }, safeTimeout);

        fetch(safeUrl, {
            method: 'GET',
            mode: 'no-cors',
            cache: 'no-store',
            signal: controller ? controller.signal : undefined
        })
            .then(() => finish(true))
            .catch(() => finish(false))
            .finally(() => clearTimeout(timer));
    });
}

function extractLobbyCodeFromValue(value, options) {
    const rawValue = String(value || '').trim();
    if (!rawValue) return '';

    const opts = options || {};
    const minLength = Number(opts.minLength) > 0 ? Number(opts.minLength) : 3;
    const reservedWords = new Set(
        ['http', 'https', 'www', 'join', 'invite', 'lobby', 'room', 'party', 'match', 'code', 'id', 'game']
            .concat(Array.isArray(opts.reservedWords) ? opts.reservedWords : [])
            .map((item) => String(item || '').trim().toLowerCase())
            .filter(Boolean)
    );

    const candidates = [];
    const pushCandidate = function (candidate) {
        if (candidate === null || candidate === undefined) return;
        const text = String(candidate).trim();
        if (text) candidates.push(text);
    };

    pushCandidate(rawValue);

    const safeDecode = function (input) {
        const text = String(input || '').trim();
        if (!text) return '';
        try {
            return decodeURIComponent(text);
        } catch (err) {
            return text;
        }
    };

    const parseAsUrl = function (input) {
        const text = String(input || '').trim();
        if (!text) return;

        const parseAttempts = [text];
        if (!/^[a-z][a-z0-9+.-]*:\/\//i.test(text) && /[./]/.test(text)) {
            parseAttempts.push('https://' + text);
        }

        parseAttempts.forEach((attempt) => {
            try {
                const parsed = new URL(attempt);
                parsed.searchParams.forEach((paramValue, paramKey) => {
                    pushCandidate(paramValue);
                    pushCandidate(paramKey + '=' + paramValue);
                });

                parsed.pathname.split('/').forEach(pushCandidate);

                const hash = String(parsed.hash || '').replace(/^#/, '').trim();
                if (hash) {
                    hash.split(/[/?&=]/).forEach(pushCandidate);
                }
            } catch (err) {
                // Ignore invalid URL attempts.
            }
        });
    };

    parseAsUrl(rawValue);

    if (rawValue.includes('?')) {
        const suffix = rawValue.slice(rawValue.indexOf('?') + 1);
        suffix.split(/[&#]/).forEach(pushCandidate);
    }

    if (rawValue.includes('#')) {
        const hashPart = rawValue.slice(rawValue.indexOf('#') + 1);
        hashPart.split(/[/?&=]/).forEach(pushCandidate);
    }

    for (const candidate of candidates) {
        const decoded = safeDecode(candidate);
        const tokens = decoded.split(/[\s/?&#=,:;|]+/).filter(Boolean);

        for (let token of tokens) {
            token = token.replace(/^["'`([{<]+|["'`\])}>.,!?]+$/g, '');
            token = token.replace(/^(room|code|lobby|party|match|game|id)[_:-]*/i, '');
            if (!token) continue;

            const lower = token.toLowerCase();
            if (reservedWords.has(lower)) continue;
            if (!/^[a-z0-9_-]+$/i.test(token)) continue;
            if (token.length < minLength) continue;

            return token;
        }
    }

    return '';
}

function openSpecial(gamelink, gameTitle) {
    const rawLink = String(gamelink || '').trim();
    if (!rawLink) return;

    if (/^https?:\/\//i.test(rawLink)) {
        launchSite(rawLink, gameTitle);
        return;
    }

    const baseCandidates = [];
    try {
        if (window.parent && window.parent !== window && window.parent.location && window.parent.location.href) {
            baseCandidates.push(window.parent.location.href);
        }
    } catch (err) {
        // Ignore cross-frame location issues.
    }
    baseCandidates.push(document.referrer || '');
    baseCandidates.push(window.location.href || '');

    for (const base of baseCandidates) {
        if (!base || /^about:/i.test(base)) continue;
        try {
            const absoluteLink = new URL(rawLink, base).href;
            launchSite(absoluteLink, gameTitle);
            return;
        } catch (err) {
            // Try next base candidate.
        }
    }

    alert('Unable to resolve web game path: ' + rawLink);
} 

    // ==========================================
    // 5. PARTICLE SYSTEM
    // ==========================================
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    document.body.appendChild(canvas);
    let particles = [];
    const mouse = { x: null, y: null, radius: 100 };
    window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y; this.baseX = x; this.baseY = y;
            this.size = 1.5; this.density = (Math.random() * 20) + 2;
        }
        draw() {
            ctx.fillStyle = 'rgba(0, 229, 255, 0.8)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
        update() {
            let dx = mouse.x - this.x; let dy = mouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < mouse.radius) {
                const force = (mouse.radius - distance) / mouse.radius;
                const directionX = (dx / distance) * force * this.density;
                const directionY = (dy / distance) * force * this.density;
                this.x -= directionX; this.y -= directionY;
            } else {
                if (this.x !== this.baseX) this.x -= (this.x - this.baseX) / 10;
                if (this.y !== this.baseY) this.y -= (this.y - this.baseY) / 10;
            }
        }
    }

    function initParticles() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 180; i++) {
            particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
            particles[i].draw(); particles[i].update();
            for (let j = i; j < particles.length; j++) {
                let dx = particles[i].x - particles[j].x;
                let dy = particles[i].y - particles[j].y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 120) {
                    ctx.strokeStyle = `rgba(0, 112, 255, ${1 - dist/120})`;
                    ctx.lineWidth = 0.5; ctx.beginPath();
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                }
            }
        }
        requestAnimationFrame(animateParticles);
    }

    window.addEventListener('resize', () => { initParticles(); });
    initParticles(); animateParticles();

    // ==========================================
    // 6. INITIALIZATION & SEARCH
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
        applyRuntimeLaunchNotice();

        if (taskbarTarget && !extensions.some(ext => ext.id === taskbarTarget)) {

        const featuredFrame = document.getElementById('featured-game-frame');

        if (fullscreenBtn && featuredFrame) {
            fullscreenBtn.addEventListener('click', () => {
                if (featuredFrame.requestFullscreen) {
                    featuredFrame.requestFullscreen();
                } else if (featuredFrame.webkitRequestFullscreen) {
                    featuredFrame.webkitRequestFullscreen();
                }
            });
        }

        if (featuredFrame) {
            featuredFrame.addEventListener('load', updateFeaturedFrameScrollMode);
            document.addEventListener('fullscreenchange', updateFeaturedFrameScrollMode);
            document.addEventListener('webkitfullscreenchange', updateFeaturedFrameScrollMode);
            document.addEventListener('MSFullscreenChange', updateFeaturedFrameScrollMode);
            updateFeaturedFrameScrollMode();
        }

        if (aboutBlankBtn) {
            aboutBlankBtn.addEventListener('click', () => {
                if (!currentFeaturedGame) return;

                if (currentFeaturedGame.type === 'special') {
                    openSpecial(currentFeaturedGame.filename, currentFeaturedGame.displayname);
                } else {

                }
            });
        }

        document.getElementById('searchFeatured').addEventListener('input', e => {
            const search = e.target.value.toLowerCase();
            document.querySelectorAll('#featured-grid .game-card').forEach(card => {
                card.style.display = card.dataset.name.includes(search) ? 'block' : 'none';
            });
            refreshFeaturedRowVisibility(document.getElementById('featured-grid'));
        });

        let featuredCols = getFeaturedRowColumns();
        window.addEventListener('resize', () => {
            const nextFeaturedCols = getFeaturedRowColumns();
            if (nextFeaturedCols !== featuredCols) {
                featuredCols = nextFeaturedCols;
                generateFeaturedGrid();
                updateFavoritesView();

                const searchValue = document.getElementById('searchFeatured').value.trim().toLowerCase();
                if (searchValue) {
                    document.querySelectorAll('#featured-grid .game-card').forEach(card => {
                        card.style.display = card.dataset.name.includes(searchValue) ? 'block' : 'none';
                    });
                    refreshFeaturedRowVisibility(document.getElementById('featured-grid'));
                }
            }
        });

        window.addEventListener('popstate', () => {
            routeFromUrl();
        });

        routeFromUrl();

        document.getElementById('searchDatabase').addEventListener('input', e => {
            const search = e.target.value.toLowerCase();
            document.querySelectorAll('#sections-container .db-btn').forEach(btn => {
                const wrapper = btn.parentElement;
                wrapper.style.display = btn.value.toLowerCase().includes(search) ? 'flex' : 'none';
            });
        });

        const bar = document.getElementById('bootBar');
        const overlay = document.getElementById('boot-overlay');
        let width = 0;
        const interval = setInterval(() => {
            if (width >= 100) {
                clearInterval(interval);
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.visibility = 'hidden'; }, 500);
            } else {
                width += Math.random() * 5; 
                if(width > 100) width = 100;
                bar.style.width = width + '%';
            }
        }, 30);

<script type="text/javascript">
    // ==========================================
    // 1. HORION VISUALS (Particles & Boot)
    // ==========================================
    const tvCanvas = document.createElement('canvas');
    tvCanvas.id = 'bg-canvas';
    const tvCtx = tvCanvas.getContext('2d');
    document.body.appendChild(tvCanvas);
    
    let tvParticles = [];
    const tvMouse = { x: null, y: null, radius: 150 };
    window.addEventListener('mousemove', (e) => { tvMouse.x = e.x; tvMouse.y = e.y; });

    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y; this.baseX = x; this.baseY = y;
            this.size = 1.5; this.density = (Math.random() * 20) + 2;
        }
        draw() {
            tvCtx.fillStyle = 'rgba(0, 112, 255, 0.5)';
            tvCtx.beginPath(); tvCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2); tvCtx.fill();
        }
        update() {
            let dx = tvMouse.x - this.x; let dy = tvMouse.y - this.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < tvMouse.radius) {
                const force = (tvMouse.radius - distance) / tvMouse.radius;
                const directionX = (dx / distance) * force * this.density;
                const directionY = (dy / distance) * force * this.density;
                this.x -= directionX; this.y -= directionY;
            } else {
                if (this.x !== this.baseX) this.x -= (this.x - this.baseX) / 10;
                if (this.y !== this.baseY) this.y -= (this.y - this.baseY) / 10;
            }
        }
    }

    function initParticles() {
        tvCanvas.width = window.innerWidth; tvCanvas.height = window.innerHeight;
        tvParticles = [];
        for (let i = 0; i < 150; i++) {
            tvParticles.push(new Particle(Math.random() * tvCanvas.width, Math.random() * tvCanvas.height));
        }
    }

    function animateParticles() {
        tvCtx.clearRect(0, 0, tvCanvas.width, tvCanvas.height);
        for (let i = 0; i < tvParticles.length; i++) {
            tvParticles[i].draw(); tvParticles[i].update();
            for (let j = i; j < tvParticles.length; j++) {
                let dx = tvParticles[i].x - tvParticles[j].x;
                let dy = tvParticles[i].y - tvParticles[j].y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 100) {
                    tvCtx.strokeStyle = `rgba(0, 112, 255, ${0.5 - dist/100})`;
                    tvCtx.lineWidth = 0.5; tvCtx.beginPath();
                    tvCtx.moveTo(tvParticles[i].x, tvParticles[i].y);
                    tvCtx.lineTo(tvParticles[j].x, tvParticles[j].y); tvCtx.stroke();
                }
            }
        }
        requestAnimationFrame(animateParticles);
    }

    function isCurrentDetailsSelection(param) {
        if (!state.currentShow || !param) return false;

        const sameId = Number(state.currentShow.id) === Number(param.id);
        const sameType = String(state.currentShow.type || '') === String(param.type || '');
        if (!sameId || !sameType) return false;

        if (sameType !== 'tv') return true;

        const requestedSeason = Number(param.season);
        const requestedEpisode = Number(param.epNumber);
        const safeSeason = Number.isFinite(requestedSeason) && requestedSeason > 0 ? requestedSeason : 1;
        const safeEpisode = Number.isFinite(requestedEpisode) && requestedEpisode > 0 ? requestedEpisode : null;
        const currentEpisodeNumber = state.currentEpisode ? Number(state.currentEpisode.number) : null;

        if (state.currentSeason !== safeSeason) return false;
        if (safeEpisode && currentEpisodeNumber !== safeEpisode) return false;
        return true;
    }

    function router(viewName, param) {
        const activeView = document.querySelector('.view-section.active');
        const activeViewName = activeView ? activeView.id.replace('view-', '') : '';

        const inlinePage = document.getElementById('horion-tv-inline-page');
        if (inlinePage) inlinePage.remove();

        if (activeViewName === 'details' && viewName !== 'details' && state.currentShow) {
            saveProgress();

        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        
        const target = document.getElementById(`view-${viewName}`);
        if(target) target.classList.add('active');

        const navBtn = document.getElementById(`nav-${viewName}`);
        if(navBtn) navBtn.classList.add('active');

        window.scrollTo(0,0);

        if(viewName === 'home') {
            if(state.trending.length === 0) initHome();
        } else if(viewName === 'browse') {
            document.getElementById('browse-search').focus();
            const grid = document.getElementById('browse-grid');

                    state.browseDefault = results;
                    if(document.getElementById('browse-search').value.trim() === '') {

                    }
                });
            } else if (document.getElementById('browse-search').value.trim() === '') {
                renderGrid(state.browseDefault, 'browse-grid');
            }
            
        } else if(viewName === 'continue') {
            renderContinueWatching();

            if (!isCurrentDetailsSelection(param)) {

    function sanitizeSportsCatalogEntry(entry) {
        if (!entry || typeof entry !== 'object') return null;
        const rawId = String(entry.id || '').trim();
        if (!rawId) return null;
        const fallbackName = rawId === 'football' ? 'Soccer' : rawId;
        const rawName = String(entry.name || fallbackName).trim() || fallbackName;
        const normalizedName = rawId === 'football' ? 'Soccer' : rawName;
        return {
            id: rawId,
            name: normalizedName
        };
    }

    function getMergedSportsCatalog(remoteSports) {
        const mergedById = new Map();
        const pushEntry = function (entry) {
            const normalized = sanitizeSportsCatalogEntry(entry);
            if (!normalized) return;
            if (!mergedById.has(normalized.id)) {
                mergedById.set(normalized.id, normalized);
            }
        };

        (Array.isArray(remoteSports) ? remoteSports : []).forEach(pushEntry);
        SPORTS_FALLBACK_CATALOG.forEach(pushEntry);
        return Array.from(mergedById.values()).sort((a, b) => a.name.localeCompare(b.name));
    }

            if (posterValue.startsWith('/api/')) {
                return `https://streamed.pk${posterValue}${posterValue.endsWith('.webp') ? '' : '.webp'}`;
            }

            if (posterValue.startsWith('/')) {
                return `https://streamed.pk${posterValue}${posterValue.endsWith('.webp') ? '' : '.webp'}`;
            }

            return `${STREAMED_API_BASE}/images/proxy/${encodeURIComponent(posterValue)}.webp`;
        }

        const homeBadge = match && match.teams && match.teams.home ? match.teams.home.badge : '';
        const awayBadge = match && match.teams && match.teams.away ? match.teams.away.badge : '';
        if (homeBadge && awayBadge) {
            return `${STREAMED_API_BASE}/images/poster/${encodeURIComponent(homeBadge)}/${encodeURIComponent(awayBadge)}.webp`;

        return '';

    function renderSportsQuickChips() {
        const host = document.getElementById('sports-quick-chips');
        if (!host) return;

        host.innerHTML = '';
        const byId = new Map(sportsState.sports.map((sport) => [sport.id, sport]));
        const selectedSport = String(sportsState.sport || 'all');

        const quickSports = SPORTS_QUICK_CHIP_IDS
            .map((id) => byId.get(id))
            .filter(Boolean);

        if (selectedSport !== 'all' && byId.has(selectedSport) && !quickSports.some((sport) => sport.id === selectedSport)) {
            quickSports.unshift(byId.get(selectedSport));
        }

        const allChip = document.createElement('button');
        allChip.type = 'button';
        allChip.className = 'sports-chip' + (selectedSport === 'all' ? ' active' : '');
        allChip.textContent = 'ALL SPORTS';
        allChip.onclick = function () {
            onSportsCategoryChanged('all');
            const select = document.getElementById('sports-category-select');
            if (select) select.value = 'all';
        };
        host.appendChild(allChip);

        quickSports.forEach((sport) => {
            const chip = document.createElement('button');
            chip.type = 'button';
            chip.className = 'sports-chip' + (selectedSport === sport.id ? ' active' : '');
            chip.textContent = String(sport.name || sport.id).toUpperCase();
            chip.onclick = function () {
                onSportsCategoryChanged(sport.id);
                const select = document.getElementById('sports-category-select');
                if (select) select.value = sport.id;
            };
            host.appendChild(chip);
        });
    }

            homeBadge.alt = match?.teams?.home?.name || 'Home';
            homeBadge.loading = 'lazy';
            homeBadge.referrerPolicy = 'no-referrer';
            homeBadge.onerror = () => { homeBadge.style.visibility = 'hidden'; };

            homeName.className = 'sports-team-name';
            homeName.textContent = match?.teams?.home?.name || 'Home';

            awayTeam.className = 'sports-team';
            const awayBadge = document.createElement('img');
            awayBadge.src = getBadgeUrl(match?.teams?.away?.badge) || '';
            awayBadge.alt = match?.teams?.away?.name || 'Away';
            awayBadge.loading = 'lazy';
