<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horion Launcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --hacker-blue: #0070ff;
      --neon-blue: #00e5ff;
      --bg-dark: #000000;
      --card-bg: rgba(0, 10, 30, 0.62);
      --card-bg-soft: rgba(7, 20, 40, 0.56);
      --border-glow: rgba(0, 112, 255, 0.3);
      --status-ok: #5fd5ff;
      --status-error: #ff9f9f;
      --muted: #8ea7bf;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: #ffffff;
      font-family: "Inter", sans-serif;
      background-color: var(--bg-dark);
      background-image:
        radial-gradient(circle at 18% 8%, rgba(0, 229, 255, 0.12), transparent 30%),
        radial-gradient(circle at 80% 14%, rgba(0, 112, 255, 0.16), transparent 36%),
        radial-gradient(circle at center, #001a33 0%, #000000 100%);
      display: grid;
      align-items: center;
      justify-items: center;
      padding: 18px 16px;
    }

    .portal-shell {
      width: min(1000px, 100%);
      display: grid;
      gap: 18px;
    }

    .portal-container {
      background: var(--card-bg);
      border: 1px solid var(--border-glow);
      border-radius: 8px;
      padding: 46px 34px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0, 112, 255, 0.1);
      backdrop-filter: blur(5px);
    }

    .portal-title {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.78rem;
      color: var(--neon-blue);
      letter-spacing: 0.38em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .app-name {
      margin: 0;
      font-size: clamp(2.15rem, 8.2vw, 4rem);
      font-weight: 300;
      letter-spacing: clamp(0.26em, 1.9vw, 0.42em);
      text-transform: uppercase;
      color: #ffffff;
      text-indent: 0.2em;
    }

    .description {
      max-width: 680px;
      margin: 20px auto 28px;
      color: #90a7ba;
      font-size: 1rem;
      line-height: 1.65;
      font-weight: 300;
    }

    .launch-btn {
      display: inline-block;
      border: 1px solid var(--hacker-blue);
      background: rgba(0, 112, 255, 0.12);
      color: #ffffff;
      font-family: "JetBrains Mono", monospace;
      font-size: 1.04rem;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      padding: 18px 58px;
      cursor: pointer;
      transition: all 0.24s ease;
      min-width: 280px;
    }

    .launch-btn:hover {
      background: var(--hacker-blue);
      box-shadow: 0 0 30px rgba(0, 112, 255, 0.8);
      transform: scale(1.03);
    }

    .launch-btn:active {
      transform: scale(1.01);
    }

    .status-label {
      margin-top: 18px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.74rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--status-ok);
      min-height: 1.2em;
    }

    .status-label.error {
      color: var(--status-error);
    }

    .meta-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .meta-card {
      background: var(--card-bg-soft);
      border: 1px solid rgba(0, 112, 255, 0.2);
      border-radius: 4px;
      padding: 14px;
    }

    .meta-card h3 {
      margin: 0 0 8px;
      font-family: "JetBrains Mono", monospace;
      color: #81dfff;
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .meta-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .footer-row {
      display: grid;
      gap: 12px;
      justify-items: center;
      margin-top: 4px;
      text-align: center;
    }

    .beta-note {
      max-width: 760px;
      color: #9cc2d8;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      line-height: 1.6;
      text-transform: uppercase;
      padding: 10px 12px;
      border: 1px solid rgba(0, 112, 255, 0.24);
      background: rgba(0, 112, 255, 0.08);
      border-radius: 4px;
    }

    .bug-btn {
      display: inline-block;
      border: 1px solid rgba(0, 229, 255, 0.65);
      background: rgba(0, 112, 255, 0.2);
      color: #e5f9ff;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.9rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      font-weight: 700;
      padding: 14px 26px;
      min-width: 360px;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .bug-btn:hover {
      color: #ffffff;
      border-color: var(--neon-blue);
      background: rgba(0, 229, 255, 0.2);
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
    }

    .github-link {
      color: #77d7ff;
      text-decoration: none;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(119, 215, 255, 0.35);
      padding-bottom: 2px;
    }

    .github-link:hover {
      color: #c8f1ff;
      border-bottom-color: rgba(200, 241, 255, 0.75);
    }

    @media (max-width: 860px) {
      .portal-container {
        padding: 34px 18px;
      }

      .description {
        margin-bottom: 22px;
      }

      .launch-btn {
        width: 100%;
        min-width: 0;
      }

      .bug-btn {
        width: 100%;
        min-width: 0;
      }

      .meta-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="portal-shell">
    <section class="portal-container">
      <div class="portal-title">Base Horion</div>
      <h1 class="app-name">HORION</h1>
      <p class="description">
        Horion is a game launcher and TV platform, with a built in Youtube unblocker and Live Sports, along with loads of features, all in a about:blank frame. I'm a genius.
      </p>

      <button id="launch-about-blank" class="launch-btn" type="button">Launch Horion</button>
      <div id="status-log" class="status-label">Ready for injection</div>
    </section>

    <div class="footer-row">
      <a
        class="bug-btn"
        href="https://docs.google.com/forms/d/e/1FAIpQLSfB9PSqEptKQutHkIWXa8QjFNBELP1fGXX-q5lzFFelRvGqIg/viewform?usp=publish-editor"
        target="_blank"
        rel="noopener noreferrer"
      >
        Report Bug / Request
      </a>
      <a class="github-link" href="https://crosmakesgames.github.io/horion/index.html" target="_blank" rel="noopener noreferrer">Visit Official GitHub</a>
    </div>
  </div>

  <script>
    const TARGET_URL = 'https://crosmakesgames.github.io/horion/index.html';
    const TARGET_FAVICON_URL = 'https://crosmakesgames.github.io/horion/favicon.ico';

    const statusLog = document.getElementById('status-log');
    const launchBtn = document.getElementById('launch-about-blank');
    const targetReadout = document.getElementById('target-readout');

    if (targetReadout) {
      targetReadout.textContent = TARGET_URL;
    }

    function setStatus(message, isError) {
      if (!statusLog) {
        return;
      }

      statusLog.textContent = message;
      statusLog.classList.toggle('error', Boolean(isError));
    }

    function launchIntoAboutBlank() {
      setStatus('Executing Horion injection...', false);

      const popup = window.open('about:blank', '_blank');
      if (!popup) {
        setStatus('Portal blocked by browser. Allow popups and try again.', true);
        return;
      }

      const doc = popup.document;
      doc.title = 'Horion';

      const favicon = doc.createElement('link');
      favicon.rel = 'icon';
      favicon.href = TARGET_FAVICON_URL;
      doc.head.appendChild(favicon);

      const shortcutFavicon = doc.createElement('link');
      shortcutFavicon.rel = 'shortcut icon';
      shortcutFavicon.href = TARGET_FAVICON_URL;
      doc.head.appendChild(shortcutFavicon);

      const html = doc.documentElement;
      const body = doc.body;

      html.style.margin = '0';
      html.style.width = '100%';
      html.style.height = '100%';
      body.style.margin = '0';
      body.style.width = '100%';
      body.style.height = '100%';
      body.style.overflow = 'hidden';
      body.style.background = '#000';

      body.textContent = '';

      const frame = doc.createElement('iframe');
      frame.src = TARGET_URL;
      frame.allow = 'autoplay; fullscreen; xr-spatial-tracking; encrypted-media; clipboard-read; clipboard-write; display-capture';
      frame.setAttribute('allowfullscreen', '');
      frame.style.border = '0';
      frame.style.width = '100%';
      frame.style.height = '100%';
      frame.style.background = '#000';
      body.appendChild(frame);

      function postLaunchContext() {
        try {
          if (frame.contentWindow) {
            frame.contentWindow.postMessage({ type: 'HORION_LAUNCH_CONTEXT', aboutBlank: true }, '*');
          }
        } catch (err) {
          // Ignore cross-origin restrictions.
        }
      }

      frame.addEventListener('load', function () {
        postLaunchContext();
      });

      function goBackInsideFrame() {
        try {
          if (frame.contentWindow) {
            frame.contentWindow.postMessage({ type: 'HORION_BROWSER_BACK' }, '*');
          }
          if (frame.contentWindow && frame.contentWindow.history) {
            frame.contentWindow.history.back();
          }
        } catch (err) {
          // Cross-origin restrictions can block some history access in certain browsers.
        }
      }

      // Keep the launched tab on about:blank while mapping browser back to iframe history.
      popup.history.replaceState({ horion: 'root' }, '', popup.location.href);
      popup.history.pushState({ horion: 'active' }, '', popup.location.href);
      popup.addEventListener('popstate', function () {
        popup.history.pushState({ horion: 'active' }, '', popup.location.href);
        goBackInsideFrame();
      });

      // Send launch-context once immediately too, in case content is already ready.
      setTimeout(postLaunchContext, 200);

      setStatus('Horion Successfully Launched', false);
    }

    if (launchBtn) {
      launchBtn.addEventListener('click', launchIntoAboutBlank);
    }
  </script>
</body>
</html>
